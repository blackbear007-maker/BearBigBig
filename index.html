*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;line-height:1.8}
:root{
  --bg:#f8fafc;--card:#fff;--text:#1e293b;--sub:#64748b;--border:#e2e8f0;
  --orange:#f97316;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --nav-h:68px;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --fs-title:20px;--fs-body:15px;--fs-caption:12px;
}
.dark{
  --bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--sub:#94a3b8;--border:#334155;
}
body{background:var(--bg);color:var(--text);min-height:100dvh}
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow)}
.page{padding:16px;padding-bottom:calc(var(--nav-h) + 16px);max-width:430px;margin:0 auto;min-height:100dvh}
.chip{padding:6px 14px;border-radius:99px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s}
.chip-active{background:var(--orange);color:#fff}
.chip-inactive{background:var(--border);color:var(--text)}
.btn-primary{background:var(--orange);color:#fff;border:none;border-radius:14px;padding:16px 24px;font-size:16px;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s;letter-spacing:.3px}
.btn-primary:active{opacity:.8}
.btn-secondary{background:transparent;color:var(--orange);border:2px solid var(--orange);border-radius:14px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
input,select{background:var(--card);color:var(--text);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:15px;outline:none;width:100%}
input:focus,select:focus{border-color:var(--orange)}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);box-shadow:0 -1px 0 var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;cursor:pointer;font-size:11px;color:var(--sub);transition:color .15s;gap:3px}
.nav-item.active{color:var(--orange)}
.nav-bear{flex:1.2;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0;cursor:pointer}
.nav-bear-bubble{position:absolute;top:-2px;width:58px;height:58px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(249,115,22,.4)}
.bear-sleep-btn{position:fixed;bottom:calc(var(--nav-h) + 16px);right:16px;width:48px;height:48px;border-radius:50%;background:var(--card);box-shadow:var(--shadow);font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:99}
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fade-in .3s ease}
@keyframes bear-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.bear-bounce{animation:bear-bounce 2s ease-in-out infinite}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.4);opacity:0}}
.pulse-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--orange);animation:pulse-ring 1.8s ease-out infinite}
/* Sound player */
.sound-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;border-radius:14px;background:var(--bg);cursor:pointer;transition:all .2s;font-size:12px;color:var(--sub)}
.sound-btn.playing{background:rgba(249,115,22,.08);color:var(--orange)}
/* Sleep slider */
.sleep-range{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:99px;outline:none;cursor:pointer}
.sleep-range::-webkit-slider-thumb{-webkit-appearance:none;width:36px;height:36px;border-radius:50%;background:var(--orange);cursor:pointer;box-shadow:0 2px 8px rgba(249,115,22,.4)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.modal-sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:90dvh;overflow-y:auto;padding:20px}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,.15);color:#16a34a}
.badge-yellow{background:rgba(234,179,8,.15);color:#ca8a04}
.badge-red{background:rgba(239,68,68,.15);color:#dc2626}
.badge-orange{background:rgba(249,115,22,.15);color:#ea580c}
.badge-blue{background:rgba(59,130,246,.15);color:#2563eb}
.badge-purple{background:rgba(168,85,247,.15);color:#9333ea}
/* Bear bubble */
.bear-bubble{background:var(--card);border-radius:20px 20px 20px 4px;padding:14px 18px;box-shadow:var(--shadow);position:relative;font-size:14px;line-height:1.7;color:var(--text)}
.bear-bubble::before{content:'🐻';position:absolute;bottom:-10px;left:-4px;font-size:20px}
/* Sleep page dark theme */
.sleep-page{background:#0d1117;min-height:100dvh;color:#e2e8f0}
.sleep-page .card{background:#161b22;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.sleep-page .btn-primary{background:#6366f1}

// ── UTILITIES ─────────────────────────────────────────────────────────────
function useLS(key, def) {
  const [v, setV] = useState(() => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):def; } catch(e){return def;} });
  const save = useCallback(val => { const next=typeof val==='function'?val(v):val; setV(next); try{localStorage.setItem(key,JSON.stringify(next));}catch(e){} }, [key,v]);
  return [v, save];
}

function today() { return new Date().toISOString().slice(0,10); }
function now_h() { return new Date().getHours(); }

function timeOfDay() {
  const h = now_h();
  if (h >= 5 && h < 12) return 'morning';
  if (h >= 12 && h < 17) return 'afternoon';
  if (h >= 17 && h < 21) return 'evening';
  return 'night';
}

function greeting(name) {
  const tod = timeOfDay();
  const n = name || '訓練者';
  const g = { morning: `早安，${n} ☀️`, afternoon: `午安，${n} 🌤️`, evening: `晚安，${n} 🌆`, night: `夜深了，${n} 🌙` };
  return g[tod];
}

function tdee(profile) {
  if (!profile?.weight||!profile?.height||!profile?.age) return 2000;
  const bmr = profile.gender==='female'
    ? 655.1 + 9.563*profile.weight + 1.85*profile.height - 4.676*profile.age
    : 88.36 + 13.4*profile.weight + 4.8*profile.height - 5.7*profile.age;
  const act = {sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very:1.9};
  return Math.round(bmr * (act[profile.activity||'moderate']||1.55));
}

function sleepColor(h) {
  if (!h || h === 0) return '#94a3b8';
  if (h >= 7 && h <= 9) return '#22c55e';
  if (h === 6 || h === 10) return '#eab308';
  return '#ef4444';
}

function sleepMood(h) {
  if (!h || h === 0) return 'neutral';
  if (h >= 7 && h <= 9) return 'happy';
  if (h === 6 || h === 10) return 'thinking';
  if (h < 6) return 'sad';
  return 'tired';
}

// ── BEAR FACE SVG ─────────────────────────────────────────────────────────
function BearFace({ mood = 'happy', size = 120, animate = false }) {
  const c = size / 2;
  const moodMap = {
    happy:    { lEye:'arc', rEye:'arc', mouth:'smile', blush:true, brows:'up' },
    excited:  { lEye:'big', rEye:'big', mouth:'bigSmile', blush:true, brows:'up' },
    sad:      { lEye:'drop', rEye:'drop', mouth:'frown', blush:false, brows:'sad' },
    thinking: { lEye:'dot', rEye:'arc', mouth:'hmm', blush:false, brows:'tilt' },
    tired:    { lEye:'half', rEye:'half', mouth:'yawn', blush:false, brows:'flat' },
    sleepy:   { lEye:'line', rEye:'line', mouth:'sleep', blush:false, brows:'flat' },
    worried:  { lEye:'dot', rEye:'dot', mouth:'worry', blush:false, brows:'sad' },
    neutral:  { lEye:'dot', rEye:'dot', mouth:'flat', blush:false, brows:'flat' },
    love:     { lEye:'heart', rEye:'heart', mouth:'smile', blush:true, brows:'up' },
  };
  const m = moodMap[mood] || moodMap.happy;

  function Eye({ type, cx, cy }) {
    const r = size * 0.072;
    if (type === 'arc') return <path d={`M${cx-r},${cy} Q${cx},${cy-r*1.2} ${cx+r},${cy}`} stroke="#1a1a1a" strokeWidth={size*0.025} fill="none" strokeLinecap="round"/>;
    if (type === 'big') return <><circle cx={cx} cy={cy} r={r*1.1} fill="#1a1a1a"/><circle cx={cx+r*0.4} cy={cy-r*0.4} r={r*0.35} fill="white"/></>;
    if (type === 'dot') return <circle cx={cx} cy={cy} r={r*0.85} fill="#1a1a1a"/>;
    if (type === 'drop') return <><ellipse cx={cx} cy={cy+r*0.3} rx={r*0.8} ry={r} fill="#1a1a1a"/><ellipse cx={cx+r*0.2} cy={cy-r*0.1} rx={r*0.25} ry={r*0.25} fill="white"/></>;
    if (type === 'half') return <><rect x={cx-r} y={cy-r*0.1} width={r*2} height={r*1.1} rx={r} fill="#1a1a1a"/><rect x={cx-r*1.1} y={cy-r*0.8} width={r*2.2} height={r*0.9} fill="var(--card)"/></>;
    if (type === 'line') return <line x1={cx-r} y1={cy} x2={cx+r} y2={cy} stroke="#1a1a1a" strokeWidth={size*0.022} strokeLinecap="round"/>;
    if (type === 'heart') return <text x={cx} y={cy+r*0.4} textAnchor="middle" fontSize={r*1.6} fill="#ef4444">♥</text>;
    return <circle cx={cx} cy={cy} r={r} fill="#1a1a1a"/>;
  }

  function Mouth({ type }) {
    const mx = c, my = c + size*0.12;
    const sw = size*0.028;
    if (type === 'smile') return <path d={`M${mx-size*.15},${my} Q${mx},${my+size*.12} ${mx+size*.15},${my}`} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinecap="round"/>;
    if (type === 'bigSmile') return <path d={`M${mx-size*.18},${my-size*.02} Q${mx},${my+size*.15} ${mx+size*.18},${my-size*.02}`} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinecap="round"/>;
    if (type === 'frown') return <path d={`M${mx-size*.14},${my+size*.06} Q${mx},${my-size*.08} ${mx+size*.14},${my+size*.06}`} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinecap="round"/>;
    if (type === 'hmm') return <path d={`M${mx-size*.1},${my+size*.04} Q${mx+size*.04},${my} ${mx+size*.13},${my+size*.04}`} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinecap="round"/>;
    if (type === 'yawn') return <><ellipse cx={mx} cy={my+size*.04} rx={size*.1} ry={size*.07} fill="#1a1a1a"/><ellipse cx={mx} cy={my+size*.06} rx={size*.06} ry={size*.04} fill="#8B2252"/></>;
    if (type === 'sleep') return <path d={`M${mx-size*.07},${my+size*.02} Q${mx},${my+size*.06} ${mx+size*.07},${my+size*.02}`} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinecap="round"/>;
    if (type === 'worry') return <path d={`M${mx-size*.12},${my+size*.06} Q${mx},${my} ${mx+size*.12},${my+size*.06}`} stroke="#1a1a1a" strokeWidth={sw} fill="none" strokeLinecap="round"/>;
    return <line x1={mx-size*.1} y1={my+size*.03} x2={mx+size*.1} y2={my+size*.03} stroke="#1a1a1a" strokeWidth={sw} strokeLinecap="round"/>;
  }

  const earR = size * 0.18;
  const faceR = size * 0.42;
  const lx = c - faceR*0.65, rx = c + faceR*0.65, ey = c - faceR*0.52;
  const eyeY = c - size*0.04;
  const eyeGap = size*0.19;

  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{display:'block',overflow:'visible'}} className={animate?'bear-bounce':''}>
      {/* Ears */}
      <circle cx={c - faceR*0.7} cy={c - faceR*0.72} r={earR} fill="#8B5E3C"/>
      <circle cx={c + faceR*0.7} cy={c - faceR*0.72} r={earR} fill="#8B5E3C"/>
      <circle cx={c - faceR*0.7} cy={c - faceR*0.72} r={earR*0.55} fill="#C49A3C"/>
      <circle cx={c + faceR*0.7} cy={c - faceR*0.72} r={earR*0.55} fill="#C49A3C"/>
      {/* Face */}
      <circle cx={c} cy={c} r={faceR} fill="#8B5E3C"/>
      {/* Muzzle */}
      <ellipse cx={c} cy={c+size*.1} rx={size*.22} ry={size*.17} fill="#A07830"/>
      {/* Eyes */}
      <Eye type={m.lEye} cx={c - eyeGap} cy={eyeY}/>
      <Eye type={m.rEye} cx={c + eyeGap} cy={eyeY}/>
      {/* Blush */}
      {m.blush && <>
        <ellipse cx={c-faceR*.56} cy={c+size*.06} rx={size*.08} ry={size*.045} fill="rgba(255,150,120,.55)"/>
        <ellipse cx={c+faceR*.56} cy={c+size*.06} rx={size*.08} ry={size*.045} fill="rgba(255,150,120,.55)"/>
      </>}
      {/* Nose */}
      <ellipse cx={c} cy={c+size*.06} rx={size*.07} ry={size*.05} fill="#3d1a0a"/>
      {/* Mouth */}
      <Mouth type={m.mouth}/>
    </svg>
  );
}

function HomePage({ profile, records, dietLog, affection, setPage, onSleepOpen }) {
  const todayStr = today();
  const tod = timeOfDay();

  // Sleep today
  const sleepRec = records.find(r => r.type==='sleep' && r.date===todayStr);
  const sleepH = sleepRec?.hours || 0;

  // Workout today
  const trainedToday = records.some(r => r.type==='workout' && r.date===todayStr);
  const lastWorkout = [...records].reverse().find(r => r.type==='workout');

  // Calories today
  const todayDiet = dietLog[todayStr] || [];
  const todayCals = todayDiet.reduce((s,e) => s+(e.kcal||0), 0);
  const targetCals = tdee(profile);
  const calPct = Math.min(100, Math.round(todayCals/targetCals*100));

  // Bear mood based on data
  const bearMood = useMemo(() => {
    if (tod === 'night' || tod === 'evening') return 'sleepy';
    if (sleepH >= 7 && sleepH <= 9 && trainedToday) return 'excited';
    if (sleepH > 0 && sleepH < 6) return 'worried';
    if (trainedToday) return 'happy';
    return 'neutral';
  }, [tod, sleepH, trainedToday]);

  // Bear message
  const bearMsg = useMemo(() => {
    if (tod === 'night') return '要睡覺了！點下面的月亮，讓熊大大陪你入睡 🌙';
    if (!sleepH) return '你昨晚睡得好嗎？記得告訴我！';
    if (sleepH < 6) return `只睡了 ${sleepH} 小時？今天先做輕度訓練就好，身體要休息。`;
    if (sleepH >= 7 && sleepH <= 9) {
      if (!trainedToday) return '睡得很棒！今天來訓練吧？我幫你準備好課表了！';
      return '今天已經訓練了！繼續保持這節奏！';
    }
    return '記得今晚早點睡喔！';
  }, [tod, sleepH, trainedToday]);

  // Smart workout recommendation
  const lastTarget = lastWorkout?.target || '';
  const recWorkout = useMemo(() => {
    const all = [...HOME_WORKOUTS, ...GYM_WORKOUTS];
    if (!lastTarget) return all.find(w => w.level==='入門') || all[0];
    // alternate muscle groups
    const pushMuscles = ['胸','肩','三頭'];
    const pullMuscles = ['背','二頭'];
    const legMuscles = ['腿','臀'];
    const wasPush = pushMuscles.some(m => lastTarget.includes(m));
    const wasPull = pullMuscles.some(m => lastTarget.includes(m));
    const wasLeg = legMuscles.some(m => lastTarget.includes(m));
    if (wasPush) return all.find(w => pullMuscles.some(m=>w.target.includes(m))) || all[1];
    if (wasPull) return all.find(w => legMuscles.some(m=>w.target.includes(m))) || all[2];
    if (wasLeg) return all.find(w => pushMuscles.some(m=>w.target.includes(m))) || all[0];
    return all[0];
  }, [lastTarget]);

  const isNight = tod === 'night' || tod === 'evening';

  return (
    <div className="page fade" style={{paddingTop:24}}>
      {/* Greeting */}
      <div style={{marginBottom:4}}>
        <p style={{color:'var(--sub)',fontSize:12,margin:'0 0 2px'}}>{new Date().toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'})}</p>
        <h1 style={{fontSize:24,fontWeight:700,margin:0}}>{greeting(profile?.name)}</h1>
      </div>

      {/* Bear bubble */}
      <div style={{margin:'20px 0'}}>
        <BearBubble msg={bearMsg} mood={bearMood}/>
      </div>

      {/* 3 quick stats */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}}>
        <div className="card p-3" style={{textAlign:'center',cursor:'pointer'}} onClick={()=>setPage('sleep')}>
          <div style={{fontSize:22,marginBottom:2}}>{sleepH>=7&&sleepH<=9?'🌙':sleepH>0?'💤':'🌙'}</div>
          <div style={{fontSize:18,fontWeight:700,color:sleepColor(sleepH)}}>{sleepH||'—'}{sleepH?'h':''}</div>
          <div style={{fontSize:11,color:'var(--sub)'}}>昨晚睡眠</div>
        </div>
        <div className="card p-3" style={{textAlign:'center',cursor:'pointer'}} onClick={()=>setPage('eat')}>
          <div style={{fontSize:22,marginBottom:2}}>🍱</div>
          <div style={{fontSize:18,fontWeight:700,color:'var(--orange)'}}>{todayCals}</div>
          <div style={{fontSize:11,color:'var(--sub)'}}>今日熱量</div>
        </div>
        <div className="card p-3" style={{textAlign:'center',cursor:'pointer'}} onClick={()=>setPage('train')}>
          <div style={{fontSize:22,marginBottom:2}}>{trainedToday?'🔥':'💪'}</div>
          <div style={{fontSize:18,fontWeight:700,color:trainedToday?'var(--green)':'var(--orange)'}}>{trainedToday?'完成！':'出發'}</div>
          <div style={{fontSize:11,color:'var(--sub)'}}>今日訓練</div>
        </div>
      </div>

      {/* Calorie bar */}
      {targetCals > 0 && (
        <div className="card p-4 mb-4">
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:14,fontWeight:600}}>今日熱量</span>
            <span style={{fontSize:14,color:'var(--sub)'}}>{todayCals} / {targetCals} kcal</span>
          </div>
          <div style={{height:6,background:'var(--bg)',borderRadius:99,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${calPct}%`,background:calPct>110?'var(--red)':calPct>85?'var(--orange)':'var(--green)',borderRadius:99,transition:'width .5s'}}/>
          </div>
          {calPct >= 90 && <p style={{fontSize:12,color:'var(--orange)',margin:'8px 0 0'}}>熊大大說：今天吃得不錯！蛋白質記得補夠 💪</p>}
        </div>
      )}

      {/* Recommended workout — main CTA */}
      {!trainedToday && recWorkout && (
        <div className="card p-5 mb-4">
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
            <span style={{fontSize:36}}>{recWorkout.icon||'💪'}</span>
            <div>
              <p style={{fontSize:12,color:'var(--orange)',fontWeight:600,margin:'0 0 2px'}}>今天就練這個</p>
              <p style={{fontSize:18,fontWeight:700,margin:0}}>{recWorkout.name}</p>
              <p style={{fontSize:13,color:'var(--sub)',margin:0}}>{recWorkout.target} · {recWorkout.duration} 分鐘</p>
            </div>
          </div>
          <button className="btn-primary" onClick={()=>setPage('train')}>開始訓練</button>
        </div>
      )}

      {/* Night mode CTA */}
      {isNight && (
        <div className="card p-5" style={{background:'#1e1b4b',textAlign:'center'}}>
          <p style={{fontSize:28,margin:'0 0 8px'}}>🌙</p>
          <p style={{fontSize:18,fontWeight:700,color:'#e0e7ff',margin:'0 0 4px'}}>睡覺時間到了</p>
          <p style={{fontSize:13,color:'#a5b4fc',margin:'0 0 18px'}}>讓熊大大陪你放鬆入睡</p>
          <button onClick={onSleepOpen} style={{background:'#6366f1',color:'#fff',border:'none',borderRadius:14,padding:'14px 24px',fontSize:16,fontWeight:700,cursor:'pointer',width:'100%'}}>進入睡眠模式</button>
        </div>
      )}
    </div>
  );
}

  return (
    <div style={{position:'relative'}}>
      <svg width="100%" height={H + 4} viewBox={`0 0 320 ${H + 4}`} preserveAspectRatio="none" style={{overflow:'visible'}}>
        {/* Target line */}
        {targetLine && (() => {
          const y = H - (targetLine / maxVal) * (H - 8) + 2;
          return <line x1="0" x2="320" y1={y} y2={y} stroke="var(--green)" strokeWidth="1" strokeDasharray="4,3" opacity="0.6"/>;
        })()}
        {data.map((d, i) => {
          const x = (i * (320 / cols)) + (320 / cols) * 0.15;
          const w = (320 / cols) * 0.7;
          const barH = d.value ? Math.max(6, (d.value / maxVal) * (H - 8)) : 3;
          const y = H - barH + 2;
          const isToday = d.isToday;
          return (
            <g key={i}>
              <rect x={x} y={y} width={w} height={barH} rx="4"
                fill={d.value ? (isToday ? color : color) : 'var(--border)'}
                opacity={d.value ? (isToday ? 1 : 0.45) : 1}/>
              {d.value > 0 && (
                <text x={x + w/2} y={Math.max(y - 3, 10)} textAnchor="middle"
                  fontSize="9" fill={isToday ? color : 'var(--sub)'}
                  fontWeight={isToday ? '600' : '400'}>
                  {d.value}{unit}
                </text>
              )}
            </g>
          );
        })}
      </svg>
      <div style={{display:'flex', marginTop:2}}>
        {data.map((d, i) => (
          <div key={i} style={{flex:1, textAlign:'center', fontSize:10,
            color: d.isToday ? color : 'var(--sub)',
            fontWeight: d.isToday ? 600 : 400}}>
            {d.label}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── NOVEL PLAYER ──────────────────────────────────────────────────────────
const VOICES = [
  { id:'male-warm',   label:'🐻 熊大大', desc:'溫柔磁性男聲' },
  { id:'male-news',   label:'📻 播音腔', desc:'沉穩新聞男聲' },
  { id:'female-soft', label:'🌙 睡眠天使', desc:'輕柔女聲' },
];
const TTS_BASE = '/tts';
const STORY_URL = './story.json';
const LS_KEY = 'novelState';
const MOTION_STILL_MS = 8 * 60 * 1000; // 8 min no motion → sleep

function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch { return null; }
}
function saveState(s) {
  localStorage.setItem(LS_KEY, JSON.stringify(s));
}

function NovelPlayer() {
  const [chapters, setChapters] = useState(null);
  const [voiceId, setVoiceId] = useState(() => loadState()?.voiceId || 'male-warm');
  const [chapIdx, setChapIdx] = useState(() => loadState()?.chapIdx || 0);
  const [paraIdx, setParaIdx] = useState(() => loadState()?.paraIdx || 0);
  const [playing, setPlaying] = useState(false);
  const [loading, setLoading] = useState(false);
  const [bookmarks, setBookmarks] = useState(() => {
    try { return JSON.parse(localStorage.getItem('novelBookmarks') || '[]'); } catch { return []; }
  });
  const [timer, setTimer] = useState(0); // minutes, 0=off
  const [timerLeft, setTimerLeft] = useState(0);
  const [showChapList, setShowChapList] = useState(false);
  const [showBmList, setShowBmList] = useState(false);
  const [morningBanner, setMorningBanner] = useState(false);
  const [error, setError] = useState('');

  const audioRef = useRef(null);
  const playQueueRef = useRef([]);
  const playingRef = useRef(false);
  const timerRef = useRef(null);
  const motionRef = useRef({ lastMove: Date.now(), timer: null });
  const chapIdxRef = useRef(chapIdx);
  const paraIdxRef = useRef(paraIdx);
  chapIdxRef.current = chapIdx;
  paraIdxRef.current = paraIdx;

  // Load story.json once
  useEffect(() => {
    fetch(STORY_URL)
      .then(r => r.json())
      .then(data => setChapters(data))
      .catch(() => setError('熊大大找不到故事檔案，請重新整理一下'));
  }, []);

  // Morning banner: if there's a saved sleep bookmark from yesterday
  useEffect(() => {
    const bms = bookmarks.filter(b => b.type === 'auto-sleep');
    if (bms.length > 0) {
      const last = bms[bms.length - 1];
      const today = new Date().toISOString().slice(0, 10);
      if (last.date !== today) setMorningBanner(last);
    }
  }, []);

  // Persist progress
  useEffect(() => {
    saveState({ chapIdx, paraIdx, voiceId });
  }, [chapIdx, paraIdx, voiceId]);

  // Persist bookmarks
  useEffect(() => {
    localStorage.setItem('novelBookmarks', JSON.stringify(bookmarks));
  }, [bookmarks]);

  // Sleep timer countdown
  useEffect(() => {
    if (timerRef.current) clearInterval(timerRef.current);
    if (timer > 0) {
      setTimerLeft(timer * 60);
      timerRef.current = setInterval(() => {
        setTimerLeft(t => {
          if (t <= 1) {
            clearInterval(timerRef.current);
            stopPlayback();
            addAutoSleepBookmark();
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [timer]);

  // DeviceMotion sleep detection
  useEffect(() => {
    const onMotion = (e) => {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);
      if (Math.abs(mag - 9.8) > 0.3) { // device moved
        motionRef.current.lastMove = Date.now();
      }
    };
    window.addEventListener('devicemotion', onMotion);
    const checker = setInterval(() => {
      if (playingRef.current && Date.now() - motionRef.current.lastMove > MOTION_STILL_MS) {
        stopPlayback();
        addAutoSleepBookmark();
      }
    }, 60000);
    return () => { window.removeEventListener('devicemotion', onMotion); clearInterval(checker); };
  }, []);

  const addAutoSleepBookmark = () => {
    if (!chapters) return;
    const ch = chapters[chapIdxRef.current];
    const bm = {
      id: 'sleep-' + Date.now(),
      label: `😴 睡前書籤`,
      chapIdx: chapIdxRef.current,
      paraIdx: paraIdxRef.current,
      chapterTitle: ch?.title || '',
      type: 'auto-sleep',
      date: new Date().toISOString().slice(0, 10),
    };
    setBookmarks(prev => [...prev.filter(b => b.type !== 'auto-sleep'), bm]);
  };

  const addManualBookmark = () => {
    if (!chapters) return;
    const ch = chapters[chapIdx];
    const bm = {
      id: 'bm-' + Date.now(),
      label: `🔖 ${ch?.title?.slice(0,8) || ''}`,
      chapIdx, paraIdx,
      chapterTitle: ch?.title || '',
      type: 'manual',
      date: new Date().toISOString().slice(0, 10),
    };
    setBookmarks(prev => [...prev, bm]);
  };

  const stopPlayback = () => {
    playingRef.current = false;
    setPlaying(false);
    playQueueRef.current = [];
    if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; }
  };

  const fetchAudio = async (text, voice) => {
    const url = `${TTS_BASE}?voice=${voice}&text=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('TTS 請求失敗');
    const blob = await res.blob();
    return URL.createObjectURL(blob);
  };

  const playFrom = async (ci, pi) => {
    if (!chapters) return;
    stopPlayback();
    setLoading(true);
    setError('');
    playingRef.current = true;
    setPlaying(true);
    setChapIdx(ci);
    setParaIdx(pi);

    let currentCi = ci;
    let currentPi = pi;

    const playNext = async () => {
      if (!playingRef.current) { setLoading(false); return; }
      const ch = chapters[currentCi];
      if (!ch) { stopPlayback(); setLoading(false); return; }
      const paras = ch.paragraphs;
      if (currentPi >= paras.length) {
        // next chapter
        currentCi += 1;
        currentPi = 0;
        if (currentCi >= chapters.length) { stopPlayback(); setLoading(false); return; }
        setChapIdx(currentCi);
        setParaIdx(0);
      }
      const text = paras[currentPi];
      setChapIdx(currentCi);
      setParaIdx(currentPi);
      try {
        const objUrl = await fetchAudio(text, voiceId);
        setLoading(false);
        if (!playingRef.current) { URL.revokeObjectURL(objUrl); return; }
        const audio = new Audio(objUrl);
        audioRef.current = audio;
        audio.onended = () => {
          URL.revokeObjectURL(objUrl);
          currentPi++;
          playNext();
        };
        audio.onerror = () => { setError('聲音出了點問題，等一下再試試？'); stopPlayback(); };
        audio.play().catch(() => { setError('請先點一下畫面，讓熊大大開口說話 🐻'); stopPlayback(); });
      } catch (e) {
        setError('聲音服務暫時睡著了，稍後再試 😴');
        stopPlayback();
        setLoading(false);
      }
    };

    await playNext();
  };

  const togglePlay = () => {
    if (playing) { stopPlayback(); }
    else { playFrom(chapIdx, paraIdx); }
  };

  const nextChap = () => {
    stopPlayback();
    const ni = Math.min(chapIdx + 1, (chapters?.length || 1) - 1);
    setChapIdx(ni); setParaIdx(0);
  };
  const prevChap = () => {
    stopPlayback();
    const ni = Math.max(chapIdx - 1, 0);
    setChapIdx(ni); setParaIdx(0);
  };

  const goToBookmark = (bm) => {
    setChapIdx(bm.chapIdx); setParaIdx(bm.paraIdx);
    setMorningBanner(false);
    playFrom(bm.chapIdx, bm.paraIdx);
  };

  const delBookmark = (id) => setBookmarks(prev => prev.filter(b => b.id !== id));

  const chapter = chapters?.[chapIdx];
  const totalParas = chapter?.paragraphs?.length || 1;
  const progress = Math.round((paraIdx / Math.max(totalParas - 1, 1)) * 100);
  const timerFmt = timerLeft > 0 ? `${Math.floor(timerLeft/60)}:${String(timerLeft%60).padStart(2,'0')}` : '';

  return (
    <div className="card p-4" style={{marginBottom:80,background:'#161b22'}}>
      <p style={{fontSize:13,color:'#6366f1',fontWeight:600,margin:'0 0 14px',letterSpacing:.5}}>🎙 有聲故事</p>

      {/* Morning banner */}
      {morningBanner && (
        <div style={{background:'#1e1b4b',borderRadius:12,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:11,color:'#a5b4fc',marginBottom:2}}>昨晚聽到這裡</div>
            <div style={{fontSize:13,fontWeight:600,color:'#e0e7ff'}}>{morningBanner.chapterTitle}</div>
          </div>
          <button onClick={()=>goToBookmark(morningBanner)}
            style={{background:'#6366f1',color:'#fff',border:'none',borderRadius:10,padding:'8px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>
            繼續
          </button>
        </div>
      )}

      {/* Cover + title + play — main UI */}
      <div style={{textAlign:'center',padding:'20px 0'}}>
        <div style={{fontSize:64,marginBottom:14}}>🐻</div>
        <div style={{fontSize:11,color:'#475569',marginBottom:4}}>第 {chapIdx+1} / {(chapters?.length||'...')} 章</div>
        <div style={{fontSize:16,fontWeight:700,color:'#e2e8f0',marginBottom:4,minHeight:24}}>
          {chapters ? chapter?.title : '載入中…'}
        </div>
        <div style={{fontSize:12,color:'#475569',marginBottom:20}}>熊大大說故事</div>

        {/* Progress bar */}
        <div style={{height:3,background:'#21262d',borderRadius:2,marginBottom:20,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${progress}%`,background:'#6366f1',borderRadius:2,transition:'width .3s'}}/>
        </div>

        {/* Controls */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:24,marginBottom:20}}>
          <button onClick={prevChap} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',opacity:chapIdx===0?.3:1,color:'#94a3b8'}}>⏮</button>
          <button onClick={togglePlay}
            style={{width:64,height:64,borderRadius:'50%',background:'#6366f1',border:'none',
              fontSize:26,color:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:'0 4px 20px rgba(99,102,241,.5)',transition:'transform .1s'}}
            onMouseDown={e=>e.currentTarget.style.transform='scale(.94)'}
            onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}>
            {loading ? '…' : playing ? '⏸' : '▶'}
          </button>
          <button onClick={nextChap} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',opacity:!chapters||chapIdx===chapters.length-1?.3:1,color:'#94a3b8'}}>⏭</button>
        </div>

        {/* Voice selector */}
        <div style={{display:'flex',gap:8,justifyContent:'center'}}>
          {VOICES.map(v => (
            <button key={v.id} onClick={()=>{ stopPlayback(); setVoiceId(v.id); }}
              style={{padding:'6px 12px',borderRadius:20,border:'none',
                background:voiceId===v.id?'#6366f1':'rgba(255,255,255,.06)',
                cursor:'pointer',fontSize:11,color:voiceId===v.id?'#fff':'#94a3b8',fontWeight:voiceId===v.id?600:400}}>
              {v.label}
            </button>
          ))}
        </div>
      </div>

      {/* Error */}
      {error && <div style={{background:'rgba(239,68,68,.1)',color:'#f87171',padding:'10px 14px',borderRadius:10,fontSize:12,marginBottom:10,textAlign:'center'}}>{error}</div>}

      {/* Chapter list toggle */}
      <button onClick={()=>setShowChapList(v=>!v)}
        style={{width:'100%',padding:'10px',background:'rgba(255,255,255,.04)',border:'none',borderRadius:10,
          fontSize:13,cursor:'pointer',marginBottom:8,color:'#94a3b8',textAlign:'left'}}>
        章節列表 {showChapList?'▲':'▼'}
      </button>
      {showChapList && chapters && (
        <div style={{maxHeight:200,overflowY:'auto',borderRadius:10,background:'rgba(255,255,255,.04)',marginBottom:8}}>
          {chapters.map((ch,i) => (
            <div key={i} onClick={()=>{ setShowChapList(false); stopPlayback(); setChapIdx(i); setParaIdx(0); }}
              style={{padding:'10px 14px',fontSize:13,borderBottom:'1px solid rgba(255,255,255,.05)',cursor:'pointer',
                background:i===chapIdx?'rgba(99,102,241,.2)':'transparent',
                color:i===chapIdx?'#a5b4fc':'#94a3b8',fontWeight:i===chapIdx?600:400}}>
              {ch.title}
            </div>
          ))}
        </div>
      )}

      {/* Sleep timer */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
        <span style={{fontSize:12,color:'var(--sub)'}}>睡眠計時：</span>
        {[0,15,30,60].map(m => (
          <button key={m} onClick={()=>setTimer(m)}
            style={{padding:'5px 10px',borderRadius:20,border:`1px solid ${timer===m?'#6366f1':'var(--border)'}`,
              background:timer===m?'#eef2ff':'var(--card)',fontSize:12,cursor:'pointer',
              color:timer===m?'#4338ca':'var(--sub)'}}>
            {m===0?'關閉':`${m}分`}
          </button>
        ))}
        {timerFmt && <span style={{fontSize:12,color:'#6366f1',fontWeight:600}}>{timerFmt}</span>}
      </div>

      {/* Bookmarks */}
      {bookmarks.length > 0 && (
        <>
          <button onClick={()=>setShowBmList(v=>!v)}
            style={{width:'100%',padding:'8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,
              fontSize:13,cursor:'pointer',color:'var(--text)'}}>
            🔖 我的書籤（{bookmarks.length}）{showBmList?'▲':'▼'}
          </button>
          {showBmList && (
            <div style={{marginTop:6,borderRadius:8,border:'1px solid var(--border)'}}>
              {bookmarks.map(bm => (
                <div key={bm.id} style={{display:'flex',alignItems:'center',padding:'10px 12px',
                  borderBottom:'1px solid var(--border)',gap:8}}>
                  <div style={{flex:1,cursor:'pointer'}} onClick={()=>goToBookmark(bm)}>
                    <div style={{fontSize:13,fontWeight:600}}>{bm.label}</div>
                    <div style={{fontSize:11,color:'var(--sub)'}}>{bm.chapterTitle} · {bm.date}</div>
                  </div>
                  <button onClick={()=>delBookmark(bm.id)}
                    style={{background:'none',border:'none',color:'var(--sub)',fontSize:16,cursor:'pointer'}}>×</button>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── SLEEP PAGE ─────────────────────────────────────────────────────────────
function SleepPage({ records, setRecords }) {
  const todayStr = today();
  const existing = records.find(r=>r.type==='sleep'&&r.date===todayStr);
  const [hours, setHours] = useState(existing?.hours||7);
  const [saved, setSaved] = useState(!!existing);
  const [playingSound, setPlayingSound] = useState(null);
  const [scriptIdx, setScriptIdx] = useState(0);
  const [showScript, setShowScript] = useState(false);
  const audioCtxRef = useRef(null);
  const sourceRef = useRef(null);
  const gainRef = useRef(null);

  const sleepChart = useMemo(() => {
    const dayNames = ['日','一','二','三','四','五','六'];
    return Array.from({length:7}, (_,i) => {
      const d = new Date(); d.setDate(d.getDate()-(6-i));
      const ds = d.toISOString().slice(0,10);
      const rec = records.find(r=>r.type==='sleep'&&r.date===ds);
      return { label: i===6?'今天':dayNames[d.getDay()], value: rec?.hours||0, isToday: i===6 };
    });
  }, [records]);

  const mood = sleepMood(hours);
  const color = sleepColor(hours);

  const sleepLabel = h => {
    if (h === 0) return '略過';
    if (h < 6) return `${h} 小時 😟 睡太少`;
    if (h === 6) return `${h} 小時 😐 稍嫌不足`;
    if (h >= 7 && h <= 9) return `${h} 小時 😊 剛剛好！`;
    if (h === 10) return `${h} 小時 😐 稍嫌過多`;
    return `${h} 小時 😴 睡太多`;
  };

  const saveSleep = () => {
    setRecords(r => {
      const filtered = r.filter(x=>!(x.type==='sleep'&&x.date===todayStr));
      return [...filtered, {type:'sleep',date:todayStr,hours}];
    });
    setSaved(true);
  };

  // Web Audio sound generation
  const stopSound = useCallback(() => {
    if (sourceRef.current) { try{sourceRef.current.stop();}catch(e){} sourceRef.current=null; }
    if (gainRef.current) { gainRef.current=null; }
    setPlayingSound(null);
  }, []);

  const playSound = useCallback((type) => {
    if (playingSound === type) { stopSound(); return; }
    stopSound();
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    audioCtxRef.current = ctx;
    let source;

    if (type === 'white') {
      const bufLen = ctx.sampleRate * 3;
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i=0; i<bufLen; i++) data[i] = Math.random()*2-1;
      source = ctx.createBufferSource();
      source.buffer = buf;
      source.loop = true;
    } else if (type === 'brown') {
      const bufLen = ctx.sampleRate * 3;
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      let last = 0;
      for (let i=0; i<bufLen; i++) {
        const w = Math.random()*2-1;
        data[i] = (last + .02*w) / 1.02;
        last = data[i];
        data[i] *= 4;
      }
      source = ctx.createBufferSource();
      source.buffer = buf;
      source.loop = true;
    } else if (type === 'rain') {
      const bufLen = ctx.sampleRate * 2;
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i=0; i<bufLen; i++) {
        data[i] = Math.random()*2-1;
        if (Math.random() < .001) data[i] *= 3;
      }
      source = ctx.createBufferSource();
      source.buffer = buf;
      source.loop = true;
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1800;
      filter.Q.value = 0.4;
      source.connect(filter);
      const gain = ctx.createGain();
      gain.gain.value = 0.4;
      filter.connect(gain);
      gain.connect(ctx.destination);
      source.start();
      gainRef.current = gain;
      sourceRef.current = source;
      setPlayingSound(type);
      return;
    } else if (type === 'fan') {
      // oscillator-based fan sound
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = 60;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 400;
      const gain = ctx.createGain();
      gain.gain.value = 0.15;
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      gainRef.current = gain;
      sourceRef.current = osc;
      setPlayingSound(type);
      return;
    }

    if (source) {
      const gain = ctx.createGain();
      gain.gain.value = type==='brown'?0.6:0.3;
      source.connect(gain);
      gain.connect(ctx.destination);
      source.start();
      gainRef.current = gain;
      sourceRef.current = source;
    }
    setPlayingSound(type);
  }, [playingSound, stopSound]);

  useEffect(() => () => stopSound(), []);

  const sounds = [
    { id:'white', icon:'🌫️', label:'白噪音' },
    { id:'brown', icon:'🌊', label:'褐色噪音' },
    { id:'rain',  icon:'🌧️', label:'雨聲' },
    { id:'fan',   icon:'🌀', label:'電風扇' },
  ];

  const nextScript = () => setScriptIdx(i=>(i+1)%BEAR_SLEEP_SCRIPTS.length);

  return (
    <div className="page sleep-page fade" style={{paddingTop:20}}>
      <h2 style={{fontSize:20,fontWeight:700,margin:'0 0 16px',color:'#e2e8f0'}}>睡眠</h2>

      {/* Bear bubble */}
      <div style={{marginBottom:20}}>
        <BearBubble msg={
          hours>=7&&hours<=9?`哇！睡了 ${hours} 小時，狀態超好的！今天的訓練一定很爽 💪`:
          hours<6?`只睡 ${hours} 小時？熊大大擔心你啦，今天訓練輕一點，早點睡！`:
          `睡了 ${hours} 小時，還不錯喔，繼續維持！`
        } mood={mood}/>
      </div>

      {/* Sleep check-in */}
      <div className="card p-5 mb-4">
        <p style={{fontSize:15,fontWeight:600,margin:'0 0 4px',color:'#e2e8f0'}}>昨晚睡幾小時？</p>
        <p style={{fontSize:12,color:'#94a3b8',margin:'0 0 20px'}}>拖動滑桿記錄</p>

        {/* Hours display */}
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:52,fontWeight:800,color:color,lineHeight:1}}>{hours}</div>
          <div style={{fontSize:16,color:color,fontWeight:500,marginTop:4}}>小時</div>
        </div>

        {/* Slider */}

// ── EAT PAGE ──────────────────────────────────────────────────────────────
function EatPage({ profile, dietLog, setDietLog }) {
  const todayStr = today();
  const [search, setSearch] = useState('');
  const [bearReaction, setBearReaction] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [qty, setQty] = useState(1);
  const [selectedFood, setSelectedFood] = useState(null);
  const [scanMode, setScanMode] = useState(false);
  const [scanning, setScanning] = useState(false);
  const fileRef = useRef(null);
  const [meal, setMeal] = useState('lunch');

  const todayEntries = dietLog[todayStr] || [];
  const targetCals = tdee(profile);
  const todayCals = todayEntries.reduce((s,e)=>s+(e.kcal||0),0);
  const todayProt = todayEntries.reduce((s,e)=>s+(e.prot||0),0);
  const calPct = Math.min(110, Math.round(todayCals/targetCals*100));

  const mealLabels = {breakfast:'🌅 早餐',lunch:'☀️ 午餐',dinner:'🌙 晚餐',snack:'🍎 點心'};

  const addFood = (food) => {
    const entry = {...food, kcal: Math.round((food.kcal||0)*qty), prot: Math.round((food.prot||0)*qty), qty, meal, time: new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})};
    setDietLog(prev => ({...prev, [todayStr]: [...(prev[todayStr]||[]), entry]}));
    // bear reaction
    const kcal = entry.kcal;
    const prot = entry.prot;
    let cat = 'default';
    if (prot >= 20) cat = 'high_protein';
    else if (kcal >= 600) cat = 'high_cal';
    else if (kcal <= 200) cat = 'low_cal';
    else cat = 'balanced';
    const reactions = BEAR_FOOD_REACTIONS[cat];
    setBearReaction(reactions[Math.floor(Math.random()*reactions.length)]);
    setShowAdd(false);
    setSearch('');
    setSelectedFood(null);
    setQty(1);
    setTimeout(()=>setBearReaction(''), 4000);
  };

  const simulateScan = () => {
    setScanning(true);
    setTimeout(() => {
      setScanning(false);
      setScanMode(false);
      setShowAdd(true);
      setSearch('');
      setBearReaction('我好像看到了什麼！幫我選一下是哪個食物？');
      setTimeout(()=>setBearReaction(''), 5000);
    }, 2000);
  };

  const filtered = useMemo(() => {
    if (!search) return FOOD_DB.slice(0,30);
    const q = search.toLowerCase();
    return FOOD_DB.filter(f => f.name.toLowerCase().includes(q) || (f.cat||'').includes(q)).slice(0,40);
  }, [search]);

  const deleteEntry = (idx) => {
    setDietLog(prev => ({...prev, [todayStr]: prev[todayStr].filter((_,i)=>i!==idx)}));
  };

  const eatChart = useMemo(() => {
    const dayNames = ['日','一','二','三','四','五','六'];
    return Array.from({length:7}, (_,i) => {
      const d = new Date(); d.setDate(d.getDate()-(6-i));
      const ds = d.toISOString().slice(0,10);
      const entries = dietLog[ds] || [];
      const cals = entries.reduce((s,e)=>s+(e.kcal||0),0);
      return { label: i===6?'今天':dayNames[d.getDay()], value: cals, isToday: i===6 };
    });
  }, [dietLog]);

  const byMeal = useMemo(() => {
    const g = {};
    todayEntries.forEach((e,i) => { const m=e.meal||'lunch'; if(!g[m])g[m]=[]; g[m].push({...e,_idx:i}); });
    return g;
  }, [todayEntries]);

  return (
    <div className="page fade" style={{paddingTop:20}}>
      <h2 style={{fontSize:20,fontWeight:700,margin:'0 0 16px'}}>🍱 飲食</h2>

      {/* Bear reaction toast */}
      {bearReaction && (
        <div className="card p-3 mb-3 fade" style={{background:'rgba(249,115,22,.08)',borderColor:'rgba(249,115,22,.3)',display:'flex',gap:10,alignItems:'center'}}>
          <BearFace mood="happy" size={40}/>
          <p style={{fontSize:14,margin:0,flex:1}}>{bearReaction}</p>
        </div>
      )}

      {/* TDEE progress */}
      <div className="card p-4 mb-4">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <div>
            <span style={{fontSize:28,fontWeight:800,color:'var(--orange)'}}>{todayCals}</span>
            <span style={{fontSize:14,color:'var(--sub)'}}> / {targetCals} kcal</span>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:16,fontWeight:600}}>{todayProt}g</div>
            <div style={{fontSize:11,color:'var(--sub)'}}>蛋白質</div>
          </div>
        </div>
        <div style={{height:10,background:'var(--border)',borderRadius:99,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${calPct}%`,background:calPct>100?'var(--red)':calPct>75?'var(--orange)':'var(--green)',borderRadius:99,transition:'width .5s'}}/>
        </div>
        <div style={{fontSize:12,color:'var(--sub)',marginTop:6}}>
          {calPct<75?`還差 ${targetCals-todayCals} kcal`:calPct>100?`超出 ${todayCals-targetCals} kcal`:`還剩 ${targetCals-todayCals} kcal`}
        </div>
      </div>

      {/* Action buttons */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        <button className="btn-primary" onClick={()=>{setShowAdd(true);setSearch('')}}>+ 新增食物</button>
        <button onClick={()=>{fileRef.current?.click();setScanMode(true)}} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,background:'var(--card)',border:'2px solid var(--border)',borderRadius:12,padding:'10px',fontSize:14,fontWeight:600,cursor:'pointer',color:'var(--text)'}}>
          📷 拍照辨識
        </button>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={simulateScan}/>
      </div>

      {/* Scanning overlay */}
      {scanning && (
        <div className="card p-5 mb-4" style={{textAlign:'center'}}>
          <div style={{fontSize:36,marginBottom:8}}>🔍</div>
          <p style={{fontSize:14,color:'var(--sub)',margin:0}}>熊大大正在辨識中...</p>
          <div style={{marginTop:12,height:4,background:'var(--border)',borderRadius:99,overflow:'hidden'}}>
            <div style={{height:'100%',width:'60%',background:'var(--orange)',borderRadius:99,animation:'pulse-ring 1s ease-in-out infinite'}}/>
          </div>
        </div>
      )}

      {/* Add food panel */}
      {showAdd && (
        <div className="card p-4 mb-4">
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
            <p style={{fontSize:15,fontWeight:600,margin:0}}>搜尋食物</p>
            <button onClick={()=>{setShowAdd(false);setSearch('');setSelectedFood(null)}} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'var(--sub)'}}>✕</button>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋食物名稱..." style={{marginBottom:10}}/>
          {/* Meal selector */}
          <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
            {Object.entries(mealLabels).map(([k,v])=>(
              <button key={k} className={`chip ${meal===k?'chip-active':'chip-inactive'}`} onClick={()=>setMeal(k)} style={{fontSize:12}}>{v}</button>
            ))}
          </div>
          {selectedFood ? (
            <div>
              <div className="card p-3 mb-3" style={{borderColor:'var(--orange)'}}>
                <p style={{fontSize:15,fontWeight:600,margin:'0 0 4px'}}>{selectedFood.name}</p>
                <p style={{fontSize:13,color:'var(--sub)',margin:0}}>{selectedFood.kcal*qty} kcal · 蛋白質 {selectedFood.prot*qty}g</p>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                <button onClick={()=>setQty(q=>Math.max(.5,q-.5))} style={{width:36,height:36,borderRadius:'50%',border:'2px solid var(--border)',background:'var(--card)',fontSize:18,cursor:'pointer',color:'var(--text)'}}>－</button>
                <span style={{flex:1,textAlign:'center',fontSize:16,fontWeight:600}}>{qty} 份</span>
                <button onClick={()=>setQty(q=>q+.5)} style={{width:36,height:36,borderRadius:'50%',border:'2px solid var(--border)',background:'var(--card)',fontSize:18,cursor:'pointer',color:'var(--text)'}}>＋</button>
              </div>
              <button className="btn-primary" onClick={()=>addFood(selectedFood)}>加入記錄 🐻</button>
            </div>
          ) : (
            <div style={{maxHeight:260,overflowY:'auto'}}>
              {filtered.map((f,i) => (
                <div key={i} onClick={()=>setSelectedFood(f)} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)',cursor:'pointer',alignItems:'center'}}>
                  <div>
                    <p style={{fontSize:14,fontWeight:500,margin:0}}>{f.name}</p>
                    <p style={{fontSize:12,color:'var(--sub)',margin:0}}>{f.cat||''}</p>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <p style={{fontSize:14,fontWeight:600,margin:0,color:'var(--orange)'}}>{f.kcal}</p>
                    <p style={{fontSize:11,color:'var(--sub)',margin:0}}>kcal</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Today's log by meal */}
      {Object.keys(mealLabels).map(mKey => {
        const entries = byMeal[mKey];
        if (!entries?.length) return null;
        const mCals = entries.reduce((s,e)=>s+(e.kcal||0),0);
        return (
          <div key={mKey} className="card p-4 mb-3">
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
              <span style={{fontSize:14,fontWeight:600}}>{mealLabels[mKey]}</span>
              <span style={{fontSize:13,color:'var(--orange)',fontWeight:600}}>{mCals} kcal</span>
            </div>
            {entries.map((e,i) => (
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:i<entries.length-1?'1px solid var(--border)':'none',alignItems:'center'}}>
                <div>
                  <p style={{fontSize:13,margin:0}}>{e.name}</p>
                  <p style={{fontSize:11,color:'var(--sub)',margin:0}}>{e.time} · {e.qty}份</p>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:13,color:'var(--sub)'}}>{e.kcal} kcal</span>
                  <button onClick={()=>deleteEntry(e._idx)} style={{background:'none',border:'none',color:'var(--sub)',cursor:'pointer',fontSize:14}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        );
      })}

      {/* 7-day calorie trend */}
      <div className="card p-4 mb-4">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <p style={{fontSize:15,fontWeight:600,margin:0}}>📈 近7天熱量趨勢</p>
          <span style={{fontSize:12,color:'var(--sub)'}}>{targetCals} kcal 目標</span>
        </div>
        <MiniTrendChart data={eatChart} color="var(--orange)" targetLine={targetCals}/>
        <div style={{display:'flex',alignItems:'center',gap:6,marginTop:10,fontSize:11,color:'var(--sub)'}}>
          <div style={{width:20,height:1.5,background:'var(--green)',borderRadius:1,flexShrink:0}}/>
          <span>目標熱量線</span>
        </div>
      </div>

      {todayEntries.length === 0 && !showAdd && (
        <div style={{textAlign:'center',padding:'40px 0',color:'var(--sub)'}}>
          <p style={{fontSize:32,margin:'0 0 8px'}}>🍽️</p>
          <BearBubble msg="今天還沒吃東西？快去補充能量，熊大大等你回報！" mood="worried"/>
        </div>
      )}
    </div>
  );
}

// ── WORKOUT MODAL ─────────────────────────────────────────────────────────
function WorkoutModal({ workout, onClose, onComplete, records }) {
  const [step, setStep] = useState(0); // 0=detail, 1=countdown, 2=doing
  const [countdown, setCountdown] = useState(3);
  const [sets, setSets] = useState({});

  useEffect(() => {
    if (step !== 1) return;
    if (countdown <= 0) { setStep(2); return; }
    const t = setTimeout(() => setCountdown(c=>c-1), 1000);
    return () => clearTimeout(t);
  }, [step, countdown]);

  const complete = () => {
    onComplete(workout);
    onClose();
  };

  if (!workout) return null;
  const lvlColor = {入門:'var(--green)',中級:'var(--yellow)',進階:'var(--red)'};

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        {step === 0 && (<>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
            <div>
              <span className={`badge ${workout.level==='入門'?'badge-green':workout.level==='中級'?'badge-yellow':'badge-red'}`}>{workout.level}</span>
              <h2 style={{fontSize:20,fontWeight:700,margin:'8px 0 4px'}}>{workout.name}</h2>
              <p style={{fontSize:13,color:'var(--sub)',margin:0}}>🎯 {workout.target} · ⏱ {workout.duration}</p>
            </div>
            <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--sub)',alignSelf:'flex-start'}}>✕</button>
          </div>
          {workout.desc && <p style={{fontSize:14,color:'var(--sub)',marginBottom:16,lineHeight:1.6}}>{workout.desc}</p>}
          {workout.steps && (<>
            <p style={{fontSize:14,fontWeight:600,marginBottom:10}}>動作步驟</p>
            {workout.steps.map((s,i) => (
              <div key={i} style={{display:'flex',gap:12,marginBottom:10}}>
                <div style={{width:24,height:24,borderRadius:'50%',background:'var(--orange)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</div>
                <p style={{fontSize:13,color:'var(--text)',margin:0,lineHeight:1.6}}>{s}</p>
              </div>
            ))}
          </>)}
          {workout.sets && workout.sets.map((s,i) => (
            <div key={i} className="card p-3 mb-2" style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{flex:1}}>
                <p style={{fontSize:14,fontWeight:600,margin:0}}>{s.name}</p>
                <p style={{fontSize:12,color:'var(--sub)',margin:0}}>{s.reps}</p>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <button onClick={e=>{e.stopPropagation();setSets(prev=>({...prev,[i]:Math.max(0,(prev[i]||0)-1)}))}} style={{width:28,height:28,borderRadius:'50%',border:'1px solid var(--border)',background:'var(--card)',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text)'}}>－</button>
                <span style={{fontSize:16,fontWeight:600,minWidth:20,textAlign:'center'}}>{sets[i]||0}</span>
                <button onClick={e=>{e.stopPropagation();setSets(prev=>({...prev,[i]:(prev[i]||0)+1}))}} style={{width:28,height:28,borderRadius:'50%',border:'1px solid var(--border)',background:'var(--card)',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text)'}}>＋</button>
              </div>
            </div>
          ))}
          {workout.tips && <div className="card p-3 mb-4" style={{background:'rgba(249,115,22,.06)'}}><p style={{fontSize:12,color:'var(--orange)',margin:0}}>💡 {workout.tips}</p></div>}
          <a href={`https://www.youtube.com/results?search_query=${encodeURIComponent((workout.name||'')+'教學 健身 動作示範')}`}
            target="_blank" rel="noopener noreferrer"
            style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',padding:'12px',marginBottom:10,background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:12,fontSize:14,color:'var(--sub)',textDecoration:'none',boxSizing:'border-box'}}>
            📺 觀看動作示範影片
          </a>
          <button className="btn-primary" onClick={()=>{setStep(1);setCountdown(3)}}>開始訓練 🔥</button>
        </>)}
        {step === 1 && (
          <div style={{textAlign:'center',padding:'60px 0'}}>
            <div style={{fontSize:80,fontWeight:800,color:'var(--orange)',lineHeight:1}}>{countdown}</div>
            <p style={{color:'var(--sub)',marginTop:12}}>準備好了嗎？</p>
          </div>
        )}
        {step === 2 && (<>
          <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>訓練中 🔥</h2>
          <p style={{fontSize:14,color:'var(--sub)',marginBottom:20}}>{workout.name}</p>
          <BearFace mood="excited" size={80} animate/>
          <p style={{textAlign:'center',color:'var(--orange)',fontWeight:600,margin:'16px 0 24px'}}>熊大大為你加油！</p>
          <button className="btn-primary" onClick={complete}>完成訓練 🎉</button>
        </>)}
      </div>
    </div>
  );
}

function EquipPage() {

// ── PROGRESS PAGE ──────────────────────────────────────────────────────────
function ProgressPage({ records, setRecords }) {
  const workouts = records.filter(r=>r.type==='workout');
  const weights = records.filter(r=>r.type==='weight');
  const [wInput, setWInput] = useState('');

  const addWeight = () => {
    const w = parseFloat(wInput);
    if (!w || w<20||w>300) return;
    setRecords(r=>[...r,{type:'weight',date:today(),weight:w,ts:Date.now()}]);
    setWInput('');
  };

  // Heatmap: last 35 days
  const heatDays = useMemo(() => {
    const days = [];
    for (let i=34; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const ds = d.toISOString().slice(0,10);
      const count = records.filter(r=>r.type==='workout'&&r.date===ds).length;
      days.push({date:ds,count,day:d.getDate()});
    }
    return days;
  }, [records]);

  const streak = useMemo(() => {
    let s=0, d=new Date();
    while (true) {
      const ds = d.toISOString().slice(0,10);
      if (records.some(r=>r.type==='workout'&&r.date===ds)) { s++; d.setDate(d.getDate()-1); }
      else break;
    }
    return s;
  }, [records]);

  return (
    <div className="page fade" style={{paddingTop:20}}>
      <h2 style={{fontSize:20,fontWeight:700,margin:'0 0 16px'}}>進度</h2>

      {/* Bear bubble achievement */}
      {workouts.length > 0 && (
        <div style={{marginBottom:16}}>
          <BearBubble msg={
            streak >= 7 ? `連續訓練 ${streak} 天！你已經超越大多數人了 🔥` :
            streak >= 3 ? `連續 ${streak} 天！習慣正在養成中，別停下來！` :
            workouts.length > 0 ? `你已經完成了 ${workouts.length} 次訓練，每一次都算數 💪` :
            '第一次訓練永遠是最難的，今天就開始吧！'
          } mood={streak>=7?'excited':streak>=3?'happy':'neutral'}/>
        </div>
      )}

      {/* Stats row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:16}}>
        {[
          {label:'完成訓練',val:workouts.length,unit:'次',color:'var(--orange)',icon:'🏆'},
          {label:'本週',val:workouts.filter(r=>{const d=new Date(r.date),now=new Date();return (now-d)<7*86400000;}).length,unit:'次',color:'var(--green)',icon:'📅'},
          {label:'連續天數',val:streak,unit:'天',color:'var(--yellow)',icon:'🔥'},
        ].map((s,i)=>(
          <div key={i} className="card p-3" style={{textAlign:'center'}}>
            <div style={{fontSize:20,marginBottom:2}}>{s.icon}</div>
            <div style={{fontSize:24,fontWeight:800,color:s.color}}>{s.val}</div>
            <div style={{fontSize:11,color:'var(--sub)'}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Heatmap */}
      <div className="card p-4 mb-4">
        <p style={{fontSize:14,fontWeight:600,margin:'0 0 12px'}}>訓練熱力圖（近35天）</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4}}>
          {heatDays.map((d,i)=>(
            <div key={i} title={d.date} style={{aspectRatio:'1',borderRadius:4,background:d.count?`rgba(249,115,22,${Math.min(1,d.count*0.5+0.3)})`:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:d.count?'#fff':'transparent'}}>{d.day}</div>
          ))}
        </div>
      </div>

      {/* Weight log */}
      <div className="card p-4 mb-4">
        <p style={{fontSize:14,fontWeight:600,margin:'0 0 12px'}}>體重記錄</p>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <input type="number" value={wInput} onChange={e=>setWInput(e.target.value)} placeholder="今日體重 kg" style={{flex:1}}/>
          <button className="btn-primary" onClick={addWeight} style={{width:'auto',padding:'10px 18px',flexShrink:0}}>記錄</button>
        </div>
        {weights.slice(-10).reverse().map((w,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:13,color:'var(--sub)'}}>{w.date}</span>
            <span style={{fontSize:14,fontWeight:600}}>{w.weight} kg</span>
          </div>
        ))}
      </div>

      {/* Recent workouts */}
      <div className="card p-4">
        <p style={{fontSize:14,fontWeight:600,margin:'0 0 12px'}}>訓練紀錄</p>
        {workouts.length===0 && <p style={{color:'var(--sub)',fontSize:13}}>還沒有訓練紀錄</p>}
        {workouts.slice(-15).reverse().map((w,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
            <div>
              <p style={{fontSize:13,fontWeight:500,margin:0}}>{w.name||'訓練'}</p>
              <p style={{fontSize:11,color:'var(--sub)',margin:0}}>{w.target||''}</p>
            </div>
            <span style={{fontSize:12,color:'var(--sub)'}}>{w.date}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── HEALTH SYNC HELPERS ────────────────────────────────────────────────────

async function parseAppleHealthZip(file) {
  if (!window.JSZip) throw new Error('JSZip 未載入');
  const zip = await JSZip.loadAsync(file);
  let xmlFile = null;
  zip.forEach((relPath, f) => { if (relPath.endsWith('export.xml') && !xmlFile) xmlFile = f; });
  if (!xmlFile) throw new Error('找不到 export.xml，請確認是 Apple Health 匯出的 .zip 檔');
  const xmlText = await xmlFile.async('string');
  return parseSleepFromHealthXML(xmlText);
}

function parseSleepFromHealthXML(xmlText) {
  const ASLEEP = new Set([
    'HKCategoryValueSleepAnalysisAsleepUnspecified',
    'HKCategoryValueSleepAnalysisAsleepCore',
    'HKCategoryValueSleepAnalysisAsleepDeep',
    'HKCategoryValueSleepAnalysisAsleepREM',
  ]);
  const nights = {};
  const tagRe = /<Record\b([^>]+)\/>/g;
  const attrRe = /(\w+)="([^"]*)"/g;
  let tag;
  while ((tag = tagRe.exec(xmlText)) !== null) {
    const attrs = {};
    let a; attrRe.lastIndex = 0;
    while ((a = attrRe.exec(tag[1])) !== null) attrs[a[1]] = a[2];
    if (attrs.type !== 'HKCategoryTypeIdentifierSleepAnalysis') continue;
    if (!ASLEEP.has(attrs.value)) continue;
    const start = new Date(attrs.startDate);
    const end   = new Date(attrs.endDate);
    if (isNaN(start) || isNaN(end)) continue;
    const hours = (end - start) / 3600000;
    const nd = new Date(start);
    if (start.getHours() < 12) nd.setDate(nd.getDate() - 1);
    const ds = nd.toISOString().slice(0, 10);
    nights[ds] = (nights[ds] || 0) + hours;
  }
  return Object.entries(nights)
    .filter(([, h]) => h > 0.5 && h < 20)
    .map(([date, hours]) => ({ type: 'sleep', date, hours: Math.round(hours * 10) / 10 }));
}

function mergeSleepRecords(existing, imported) {
  const seen = new Set(existing.filter(r => r.type === 'sleep').map(r => r.date));
  return [...existing, ...imported.filter(r => !seen.has(r.date))];
}

async function fetchGoogleFitSleep(accessToken) {
  const now = Date.now();
  const ago90 = now - 90 * 24 * 60 * 60 * 1000;
  const res = await fetch(
    `https://www.googleapis.com/fitness/v1/users/me/sessions?activityType=72&startTime=${new Date(ago90).toISOString()}&endTime=${new Date(now).toISOString()}`,
    { headers: { Authorization: `Bearer ${accessToken}` } }
  );
  if (!res.ok) throw new Error('Google Fit API 錯誤 ' + res.status);
  const data = await res.json();
  return (data.session || []).map(s => {
    const start = new Date(parseInt(s.startTimeMillis));
    const end   = new Date(parseInt(s.endTimeMillis));
    const hours = (end - start) / 3600000;
    const nd = new Date(start);
    if (start.getHours() < 12) nd.setDate(nd.getDate() - 1);
    return { type: 'sleep', date: nd.toISOString().slice(0, 10), hours: Math.round(hours * 10) / 10 };
  }).filter(r => r.hours > 1 && r.hours < 16);
}

// ── DATA SETTINGS ──────────────────────────────────────────────────────────
function DataSettings({ open, onClose, records, setRecords }) {
  const [tab, setTab] = React.useState('backup');
  const [importStatus, setImportStatus] = React.useState(null);
  const [healthStatus, setHealthStatus] = React.useState(null);
  const [gfClientId, setGfClientId] = useLS('bear_gfit_client', '');
  const fileRef = React.useRef();
  const ahRef = React.useRef();

  const KEYS = ['bear_profile','gym_records','gym_diet','gym_favorites','bear_dark'];

  function handleExport() {
    const data = { version: 1, exported_at: new Date().toISOString() };
    KEYS.forEach(k => { try { data[k] = JSON.parse(localStorage.getItem(k) || 'null'); } catch(e) { data[k] = null; } });
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `熊大大備份_${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
  }

  function handleImport(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.version) throw new Error('格式錯誤');
        KEYS.forEach(k => { if (data[k] != null) localStorage.setItem(k, JSON.stringify(data[k])); });
        setImportStatus('ok');
        setTimeout(() => window.location.reload(), 1200);
      } catch(err) { setImportStatus('err'); }
    };
    reader.readAsText(file);
  }

  async function handleAppleHealth(e) {
    const file = e.target.files[0]; if (!file) return;
    setHealthStatus('loading');
    try {
      const imported = await parseAppleHealthZip(file);
      if (!imported.length) { setHealthStatus('empty'); return; }
      setRecords(prev => mergeSleepRecords(prev, imported));
      setHealthStatus({ count: imported.length });
    } catch(err) { setHealthStatus('err:' + err.message); }
  }

  function handleGoogleFit() {
    if (!gfClientId.trim()) { setHealthStatus('no_client_id'); return; }
    if (!window.google?.accounts?.oauth2) { setHealthStatus('gis_not_loaded'); return; }
    setHealthStatus('connecting');
    const client = google.accounts.oauth2.initTokenClient({
      client_id: gfClientId.trim(),
      scope: 'https://www.googleapis.com/auth/fitness.sleep.read',
      callback: async (resp) => {
        if (resp.error) { setHealthStatus('err:' + resp.error); return; }
        try {
          const imported = await fetchGoogleFitSleep(resp.access_token);
          if (!imported.length) { setHealthStatus('empty'); return; }
          setRecords(prev => mergeSleepRecords(prev, imported));
          setHealthStatus({ count: imported.length });
        } catch(e) { setHealthStatus('err:' + e.message); }
      }
    });
    client.requestAccessToken();
  }

  const btnStyle = { width:'100%', padding:'14px', marginBottom:10, background:'var(--card)', border:'1.5px solid var(--border)', borderRadius:12, fontSize:15, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8, color:'var(--text)' };

  if (!open) return null;

  return (
    <div style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'flex-end'}} onClick={onClose}>
      <div style={{width:'100%',background:'var(--bg)',borderRadius:'20px 20px 0 0',padding:'24px 20px 36px',boxShadow:'0 -4px 24px rgba(0,0,0,.2)',maxHeight:'85vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:4,background:'var(--border)',borderRadius:99,margin:'0 auto 16px'}}/>

        {/* Tabs */}
        <div style={{display:'flex',gap:8,marginBottom:20}}>
          {[['backup','📦 備份'],['health','🏥 健康資料']].map(([id,label])=>(
            <button key={id} onClick={()=>{setTab(id);setImportStatus(null);setHealthStatus(null);}}
              style={{flex:1,padding:'10px',borderRadius:10,border:`1.5px solid ${tab===id?'#6366f1':'var(--border)'}`,background:tab===id?'#6366f115':'var(--card)',color:tab===id?'#6366f1':'var(--text)',cursor:'pointer',fontSize:14,fontWeight:tab===id?600:400}}>
              {label}
            </button>
          ))}
        </div>

        {/* Backup Tab */}
        {tab === 'backup' && <>
          <button onClick={handleExport} style={btnStyle}>⬇️ 匯出備份（下載 JSON）</button>
          <button onClick={()=>fileRef.current.click()} style={btnStyle}>⬆️ 匯入備份（還原 JSON）</button>
          <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImport}/>
          {importStatus === 'ok' && <p style={{textAlign:'center',color:'#22c55e',fontSize:14,margin:'8px 0'}}>✅ 匯入成功，即將重新載入…</p>}
          {importStatus === 'err' && <p style={{textAlign:'center',color:'#ef4444',fontSize:14,margin:'8px 0'}}>❌ 格式錯誤，請使用熊大大匯出的備份檔</p>}
          <p style={{fontSize:12,color:'var(--text-muted)',textAlign:'center',marginTop:12,lineHeight:1.6}}>備份包含個人資料、訓練紀錄、飲食日誌<br/>匯入後將覆蓋現有資料</p>
        </>}

        {/* Health Tab */}
        {tab === 'health' && <>
          {/* iOS: Apple Health */}
          <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:8,fontWeight:600}}>🍎 iOS — Apple Health</p>
          <button onClick={()=>ahRef.current.click()} style={btnStyle}>📂 匯入 Apple Health 匯出檔</button>
          <input ref={ahRef} type="file" accept=".zip" style={{display:'none'}} onChange={handleAppleHealth}/>
          <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:16,lineHeight:1.6}}>
            iPhone → 健康 → 右上角頭像 → 匯出所有健康資料 → 分享 .zip → 選取
          </p>

          {/* Android: Google Fit */}
          <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:8,fontWeight:600}}>🤖 Android — Google Fit</p>
          <input
            value={gfClientId}
            onChange={e=>setGfClientId(e.target.value)}
            placeholder="貼上 Google OAuth Client ID"
            style={{width:'100%',padding:'10px 12px',borderRadius:10,border:'1.5px solid var(--border)',background:'var(--card)',color:'var(--text)',fontSize:13,boxSizing:'border-box',marginBottom:8}}
          />
          <button onClick={handleGoogleFit} style={{...btnStyle, marginBottom:4}}>
            {healthStatus==='connecting'?'🔄 授權中…':'🔗 連接 Google Fit'}
          </button>
          <p style={{fontSize:11,color:'var(--text-muted)',marginBottom:16,lineHeight:1.6}}>
            需先在 Google Cloud Console 建立 OAuth 憑證（Fitness API）
          </p>

          {/* Status messages */}
          {healthStatus === 'loading' && <p style={{textAlign:'center',color:'#6366f1',fontSize:14}}>⏳ 解析中，大檔案可能需要幾秒…</p>}
          {healthStatus === 'empty' && <p style={{textAlign:'center',color:'#f59e0b',fontSize:14}}>⚠️ 找不到睡眠紀錄，請確認裝置已記錄睡眠</p>}
          {healthStatus === 'no_client_id' && <p style={{textAlign:'center',color:'#ef4444',fontSize:14}}>❌ 請先貼上 Google Client ID</p>}
          {healthStatus === 'gis_not_loaded' && <p style={{textAlign:'center',color:'#ef4444',fontSize:14}}>❌ Google 驗證庫載入失敗，請重新整理</p>}
          {typeof healthStatus === 'object' && healthStatus?.count && (
            <p style={{textAlign:'center',color:'#22c55e',fontSize:14}}>✅ 匯入 {healthStatus.count} 筆睡眠紀錄！</p>
          )}
          {typeof healthStatus === 'string' && healthStatus.startsWith('err:') && (
            <p style={{textAlign:'center',color:'#ef4444',fontSize:13,lineHeight:1.5}}>❌ {healthStatus.slice(4)}</p>
          )}
        </>}
      </div>
    </div>
  );
}


function ThemeToggle({ dark, toggle }) {
  return (
    <button onClick={toggle} style={{position:'fixed',top:14,right:16,zIndex:150,background:'var(--card)',border:'1px solid var(--border)',borderRadius:99,width:38,height:38,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 6px rgba(0,0,0,.1)'}}>
      {dark?'☀️':'🌙'}
    </button>
  );
}

// ── APP ROOT ───────────────────────────────────────────────────────────────
function App() {
  const [profile, setProfile] = useLS('bear_profile', null);
  const [records, setRecords] = useLS('gym_records', []);
  const [dietLog, setDietLog] = useLS('gym_diet', {});
  const [page, setPage] = useState('home');
  const [darkMode, setDarkMode] = useLS('bear_dark', null); // null=auto
  const [showSettings, setShowSettings] = useState(false);

  // Auto dark based on time or saved preference
  const isNight = timeOfDay() === 'night';
  const dark = darkMode !== null ? darkMode : isNight;

  useEffect(() => {
    document.body.classList.toggle('dark', dark);
  }, [dark]);

  const toggleDark = () => setDarkMode(d => d===null ? !isNight : !d);

  if (!profile) return <><ProfileSetup onDone={p=>setProfile(p)}/></>;

  return (
    <>
      <ThemeToggle dark={dark} toggle={toggleDark}/>
      <button onClick={()=>setShowSettings(true)} style={{position:'fixed',top:14,left:16,zIndex:150,background:'var(--card)',border:'1px solid var(--border)',borderRadius:99,width:38,height:38,fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 6px rgba(0,0,0,.1)'}}>
        ⚙️
      </button>
      <DataSettings open={showSettings} onClose={()=>setShowSettings(false)} records={records} setRecords={setRecords}/>
      {page === 'home'  && <HomePage profile={profile} records={records} dietLog={dietLog} affection={70} setPage={setPage} onSleepOpen={()=>setPage('sleep')}/>}
      {page === 'eat'   && <EatPage profile={profile} dietLog={dietLog} setDietLog={setDietLog}/>}
      {page === 'sleep' && <SleepPage records={records} setRecords={setRecords}/>}
      {page === 'train' && <TrainPage records={records} setRecords={setRecords}/>}
      <NavBar page={page} setPage={setPage}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(e=>console.warn('SW:',e));
  });
}
</script>
</body>
