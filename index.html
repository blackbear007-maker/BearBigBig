function useLocalStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const save = useCallback(v => {
    setVal(v);
    localStorage.setItem(key, JSON.stringify(v));
  }, [key]);
  return [val, save];
}

function WorkoutDetailModal({ workout, onClose, onComplete }) {
  const [active, setActive] = useState(null);
  const [done, setDone] = useState([]);
  const [sets, setSets] = useState({}); // #9 組數
  const [timer, setTimer] = useState(null);
  const [timerOn, setTimerOn] = useState(false);
  const timerRef = useRef(null);
  const [elapsed, setElapsed] = useState(0);
  const elapsedRef = useRef(null);

  useEffect(() => {
    elapsedRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(elapsedRef.current);
  }, []);

  const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  useEffect(() => {
    if (timerOn && timer > 0) {
      timerRef.current = setTimeout(() => setTimer(t => t - 1), 1000);
    } else if (timer === 0) setTimerOn(false);
    return () => clearTimeout(timerRef.current);
  }, [timer, timerOn]);

  const toggle = (i) => {
    const unchecking = done.includes(i);
    setDone(prev => unchecking ? prev.filter(x => x !== i) : [...prev, i]);
    if (!unchecking) { setTimer(workout.exercises[i].rest); setTimerOn(true); }
    else { setTimerOn(false); setTimer(null); }
  };

  const allDone = done.length === workout.exercises.length;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div>
            <span className="text-2xl">{workout.icon}</span>
            <h2 className="font-bold text-white text-xl inline ml-2">{workout.name}</h2>
          </div>
          <div className="flex items-center gap-3">
            <div style={{background:'rgba(249,115,22,0.15)',border:'1px solid rgba(249,115,22,0.3)',borderRadius:'10px',padding:'4px 10px',textAlign:'center'}}>
              <p style={{fontSize:'9px',color:'#fb923c',fontWeight:600}}>訓練時間</p>
              <p style={{fontSize:'18px',fontWeight:700,color:'#f97316',fontVariantNumeric:'tabular-nums'}}>{fmtTime(elapsed)}</p>
            </div>
            <button onClick={onClose} className="text-slate-400 text-2xl">×</button>
          </div>
        </div>
        <div className="flex gap-2 mb-4">
          <span className="badge" style={{background:'rgba(249,115,22,0.2)',color:'#f97316'}}>⏱ {workout.duration}分鐘</span>
          <span className="badge" style={{background:'rgba(99,102,241,0.2)',color:'#818cf8'}}>🎯 {workout.target}</span>
          <span className="badge" style={{background:'rgba(16,185,129,0.2)',color:'#34d399'}}>{workout.level}</span>
        </div>
        <div className="progress-bar mb-4">
          <div className="progress-fill" style={{width: `${(done.length / workout.exercises.length) * 100}%`}} />
        </div>
        <p className="text-slate-400 text-xs mb-2">{done.length}/{workout.exercises.length} 動作完成</p>
        {timerOn && (
          <div className="mb-4 p-3 rounded-xl text-center" style={{background:'rgba(249,115,22,0.15)',border:'1px solid rgba(249,115,22,0.4)'}}>
            <p className="text-orange-300 text-xs font-semibold">⏱ 組間休息倒數</p>
            <p className="text-orange-400 text-4xl font-bold mt-1">{timer}s</p>
            <button onClick={()=>{setTimerOn(false);setTimer(null);}} className="text-slate-400 text-xs mt-1 underline">跳過</button>
          </div>
        )}
        {!timerOn && timer === 0 && (
          <div className="mb-4 p-3 rounded-xl text-center" style={{background:'rgba(16,185,129,0.12)',border:'1px solid rgba(16,185,129,0.4)'}}>
            <p className="text-green-400 font-bold text-sm">✅ 休息結束！準備下一組</p>
          </div>
        )}

        {workout.exercises.map((ex, i) => (
          <div key={i} className={`card p-4 mb-3 cursor-pointer transition-all ${done.includes(i) ? 'opacity-60' : ''}`}>
            <div className="flex items-start justify-between" onClick={() => setActive(active === i ? null : i)}>
              <div className="flex items-start gap-3">
                <button
                  onClick={e => { e.stopPropagation(); toggle(i); }}
                  className={`mt-0.5 w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all ${done.includes(i) ? 'bg-orange-500 border-orange-500' : 'border-slate-500'}`}
                >
                  {done.includes(i) && <span className="text-white text-xs">✓</span>}
                </button>
                {/* #9 組數 */}
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',flexShrink:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'2px',marginTop:'2px'}}>
                    <button onClick={e=>{e.stopPropagation();setSets(s=>({...s,[i]:Math.max(0,(s[i]||0)-1)}));}} style={{width:'16px',height:'16px',borderRadius:'3px',border:'1px solid #475569',background:'#1e293b',color:'#94a3b8',cursor:'pointer',fontSize:'10px',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>－</button>
                    <span style={{fontSize:'11px',fontWeight:700,minWidth:'28px',textAlign:'center',color:(sets[i]||0)>=ex.sets?'#34d399':'#f97316'}}>{sets[i]||0}<span style={{color:'#475569',fontWeight:400}}>/{ex.sets}</span></span>
                    <button onClick={e=>{e.stopPropagation();setSets(s=>({...s,[i]:(s[i]||0)+1}));}} style={{width:'16px',height:'16px',borderRadius:'3px',border:'1px solid #f97316',background:'rgba(249,115,22,0.2)',color:'#f97316',cursor:'pointer',fontSize:'10px',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>＋</button>
                  </div>
                  <span style={{fontSize:'9px',color:'#64748b'}}>組</span>
                </div>
                <div>
                  <p className={`font-bold ${done.includes(i) ? 'line-through text-slate-500' : 'text-white'}`}>{ex.name}</p>
                  <p className="text-slate-400 text-sm">{ex.sets} 組 × {ex.reps} 下 · 休息 {ex.rest}秒</p>
                </div>
              </div>
              <span className="text-slate-400 text-sm">{active === i ? '▲' : '▼'}</span>
            </div>
            {active === i && (
              <div className="mt-3 ml-9 p-3 rounded-xl" style={{background:'rgba(249,115,22,0.08)',border:'1px solid rgba(249,115,22,0.2)'}}>
                <p className="text-orange-300 text-xs font-semibold mb-1">💡 動作要點</p>
                <p className="text-slate-300 text-sm">{ex.tip}</p>
                <a href={`https://www.youtube.com/results?search_query=${encodeURIComponent(ex.name+' 健身 教學')}`}
                  target="_blank" rel="noopener noreferrer"
                  style={{display:'inline-flex',alignItems:'center',gap:'5px',marginTop:'8px',padding:'5px 10px',background:'rgba(239,68,68,0.15)',border:'1px solid rgba(239,68,68,0.35)',borderRadius:'8px',color:'#f87171',fontSize:'11px',fontWeight:600,textDecoration:'none'}}>
                  ▶ 觀看示範影片
                </a>
              </div>
            )}
          </div>
        ))}

        {allDone && (
          <button
            className="btn-primary w-full mt-2 text-center"
            onClick={() => { onComplete(workout, elapsed); onClose(); }}
          >
            🎉 完成訓練！記錄進度
          </button>
        )}
      </div>
    </div>
  );
}

          <p className="text-slate-400 text-sm mb-2 font-semibold">準備開始：{pendingWorkout && pendingWorkout.name}</p>
          <div style={{fontSize:'120px',fontWeight:900,color:'#f97316',lineHeight:1,
            animation:'bear-bounce 0.5s ease-in-out infinite alternate'}}>
            {countdown}
          </div>
          <p className="text-orange-300 text-lg mt-4 font-bold">熊大大說：準備好了嗎？🐻</p>
          <button className="btn-secondary mt-6" onClick={() => {
            clearTimeout(countRef.current); setCountdown(null); setPendingWorkout(null);

      )}
      {selected && (
        <WorkoutDetailModal
          workout={selected}

        />
      )}
    </div>
  );
}

function EquipPage() {
  const [search, setSearch] = useState('');
  const [cat, setCat] = useState('全部');
  const [selected, setSelected] = useState(null);
  const [equipCached, setEquipCached] = useLocalStorage('gym_equip_cached', false);
  const [showCachePrompt, setShowCachePrompt] = useState(false);
  const [cacheProgress, setCacheProgress] = useState(0);
  const [caching, setCaching] = useState(false);
  const [cacheDone, setCacheDone] = useState(false);

  // 首次進入器材百科，提示是否下載
  React.useEffect(() => {
    if (!equipCached) {
      const t = setTimeout(() => setShowCachePrompt(true), 400);
      return () => clearTimeout(t);
    }
  }, []);

  async function startCache() {
    setCaching(true);
    setCacheProgress(0);
    try {
      // 模擬 100 種器材逐筆快取進度
      const total = EQUIPMENT_LIST.length;
      for (let i = 0; i < total; i++) {
        await new Promise(r => setTimeout(r, 18));
        setCacheProgress(Math.round(((i + 1) / total) * 100));
      }
      // 同時用 Cache API 快取本頁（讓 PWA 可完整離線）
      if ('caches' in window) {
        const cache = await caches.open('equip-encyclopedia-v1');
        await cache.add(location.href);
      }
      setCacheDone(true);
      setEquipCached(true);
      setTimeout(() => { setShowCachePrompt(false); setCaching(false); setCacheDone(false); }, 1400);
    } catch(e) {
      setCaching(false);
      setShowCachePrompt(false);
    }
  }

  const cats = ['全部', '固定軌道機器', '自由重量', '有氧器材', '複合器材', '輔助器材', '核心訓練', '爆發力訓練', '徒手器材'];

    <div className="main-content px-4 py-6 animate-fade">
      <h1 className="text-2xl font-bold text-white mb-4">器材百科 🏋️</h1>

        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
          <div className="card p-5" style={{width:'100%',maxWidth:'340px',textAlign:'center'}}>
            {!caching && !cacheDone && (
              <>
                <div style={{fontSize:'40px',marginBottom:'12px'}}>📥</div>
                <h3 style={{color:'#f1f5f9',fontWeight:700,fontSize:'17px',marginBottom:'8px'}}>下載器材百科</h3>
                <p style={{color:'#94a3b8',fontSize:'13px',lineHeight:'1.6',marginBottom:'20px'}}>
                  將 100 種器材資料儲存到裝置，<br/>之後可完整離線使用。
                </p>
                <div style={{display:'flex',gap:'10px'}}>
                  <button
                    onClick={() => setShowCachePrompt(false)}
                    style={{flex:1,padding:'10px',borderRadius:'10px',background:'#1e293b',color:'#94a3b8',border:'1px solid #334155',fontSize:'14px',cursor:'pointer'}}>
                    略過
                  </button>
                  <button
                    onClick={startCache}
                    style={{flex:2,padding:'10px',borderRadius:'10px',background:'#f97316',color:'#fff',border:'none',fontSize:'14px',fontWeight:700,cursor:'pointer'}}>
                    下載
                  </button>
                </div>
              </>
            )}
            {caching && !cacheDone && (
              <>
                <div style={{fontSize:'36px',marginBottom:'12px'}}>⚙️</div>
                <h3 style={{color:'#f1f5f9',fontWeight:700,fontSize:'16px',marginBottom:'16px'}}>正在下載…</h3>
                <div style={{background:'#1e293b',borderRadius:'99px',height:'10px',overflow:'hidden',marginBottom:'8px'}}>
                  <div style={{height:'100%',borderRadius:'99px',background:'linear-gradient(90deg,#f97316,#fb923c)',width:`${cacheProgress}%`,transition:'width 0.12s ease'}}/>

// ─── DIET PAGE ────────────────────────────────────────────────────────────────

function DietPage({ dietLog, setDietLog, onAffChange, profile }) {
  const todayStr = new Date().toISOString().split('T')[0];
  const [search, setSearch] = useState('');
  const [meal, setMeal] = useState('早餐');
  const [custom, setCustom] = useState({ name: '', cal: '', protein: '', carb: '', fat: '' });
  const [tab, setTab] = useState('add');
  const [pendingFood, setPendingFood] = useState(null);
  const [servingMult, setServingMult] = useState(1);
  const [convenienceMode, setConvenienceMode] = useState(false);
  const todayItems = dietLog[todayStr] || [];
  const total = { cal: 0, protein: 0, carb: 0, fat: 0 };
  todayItems.forEach(i => { total.cal += i.cal; total.protein += i.protein; total.carb += i.carb; total.fat += i.fat; });

  const searchResults = FOOD_DB.filter(f => f.name.includes(search)).slice(0, 12);

  const addFood = (food, mult = 1) => {
    const m = Math.round(mult * 10) / 10;
    const sc = v => Math.round(v * m * 10) / 10;
    const entry = {
      name: food.name + (m !== 1 ? ` ×${m}` : ''),
      cal: Math.round(food.cal * m),
      protein: sc(food.protein), carb: sc(food.carb), fat: sc(food.fat),
      meal, time: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
    };
    const updated = { ...dietLog, [todayStr]: [...todayItems, entry] };
    setDietLog(updated);
    setSearch('');
    setPendingFood(null);
    setConvenienceMode(false);
    if (onAffChange) onAffChange(1);
  };

  const addCustom = () => {
    if (!custom.name.trim() || !custom.cal) return;
    const cal = +custom.cal;
    if (cal <= 0 || cal > 9999) return;
    addFood({ name: custom.name.trim(), cal, protein: Math.max(0, +custom.protein || 0), carb: Math.max(0, +custom.carb || 0), fat: Math.max(0, +custom.fat || 0) });
    setCustom({ name: '', cal: '', protein: '', carb: '', fat: '' });
  };


  // #4 常用食物快選：從全歷史統計前5高頻食物
  const freqFoods = React.useMemo(() => {
    const freq = {};
    Object.values(dietLog).flat().forEach(item => {
      const k = item.name;
      if (!freq[k]) freq[k] = { ...item, count: 0 };
      freq[k].count++;
    });
    return Object.values(freq).sort((a,b) => b.count - a.count).slice(0,5);
  }, [dietLog]);

  const removeItem = (idx) => {
    const updated = { ...dietLog, [todayStr]: todayItems.filter((_, i) => i !== idx) };
    setDietLog(updated);
  };

  const macroGoal = calcMacros(profile);

  return (
    <div className="main-content px-4 py-6 animate-fade">
      <h1 className="text-2xl font-bold text-white mb-4">飲食追蹤 🥗</h1>

      {/* Total */}
      <div className="card-orange p-4 mb-4">
        <p className="text-orange-100 text-xs font-bold mb-1">今日總攝取</p>
        <p className="text-white text-3xl font-bold">{total.cal} <span className="text-lg text-orange-200">kcal</span></p>
        {(() => {
          const rem = macroGoal.cal - total.cal;
          return rem > 0
            ? <p style={{fontSize:'12px',color:'#86efac',marginTop:'2px',fontWeight:600}}>還差 {rem} kcal 達標</p>
            : <p style={{fontSize:'12px',color:'#fb923c',marginTop:'2px',fontWeight:600}}>已超出 {Math.abs(rem)} kcal</p>;
        })()}
        <div className="progress-bar mt-2 mb-3" style={{background:'rgba(0,0,0,0.2)'}}>
          <div className="progress-fill" style={{width:`${Math.min(100,(total.cal/macroGoal.cal)*100)}%`,background:'rgba(255,255,255,0.5)'}}/>
        </div>
        <div className="grid grid-cols-3 gap-2 text-center">
          {[['蛋白質',total.protein,macroGoal.protein,'g'],['碳水',total.carb,macroGoal.carb,'g'],['脂肪',total.fat,macroGoal.fat,'g']].map(([n,v,g,u])=>(
            <div key={n}>
              <p className="text-orange-200 text-xs">{n}</p>
              <p className="text-white font-bold">{Math.round(v)}<span className="text-xs text-orange-300">/{g}{u}</span></p>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-2 mb-4" style={{flexWrap:'wrap'}}>
        {[{id:'add',label:'➕ 新增'},{id:'list',label:'📋 今日'},{id:'trend',label:'📈 七日趨勢'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className={`chip ${tab===t.id?'chip-active':'chip-inactive'}`}>{t.label}</button>
        ))}
      </div>

      {tab === 'add' && (
        <>
          <div className="flex gap-2 mb-4">
            {['早餐','午餐','晚餐','點心'].map(m=>(
              <button key={m} onClick={()=>setMeal(m)} className={`chip ${meal===m?'chip-active':'chip-inactive'}`}>{m}</button>

          </div>
          {/* 超商快捷 + 常用食物 */}
          {!search && (

              <div className="flex items-center gap-2 mb-2">
                <button

                  className={`chip ${convenienceMode ? 'chip-active' : 'chip-inactive'}`}
                  style={{fontSize:'12px'}}>

                </button>
                {convenienceMode && <span className="text-slate-400 text-xs">點食物選擇份量</span>}
              </div>
              {convenienceMode && (
                <div className="card mb-3">
                  {FOOD_DB.filter(f => f.name.startsWith('🏪')).map(f => (
                    <div key={f.name} className="flex items-center justify-between p-3 border-b border-slate-700 last:border-0">
                      <div>
                        <p className="text-white text-sm font-medium">{f.name.replace('🏪 ','')}</p>
                        <p className="text-slate-400 text-xs">P:{f.protein}g C:{f.carb}g F:{f.fat}g</p>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className="text-orange-400 font-bold text-sm">{f.cal}kcal</span>
                        <button onClick={() => { setPendingFood(f); setServingMult(1); }} className="btn-primary py-1 px-3 text-sm">+</button>

              <input placeholder="脂肪(g)" type="number" min="0" max="999" value={custom.fat} onChange={e=>setCustom({...custom,fat:e.target.value})}/>
            </div>
            <button onClick={addCustom} className="btn-primary w-full" disabled={!custom.name.trim() || !custom.cal || +custom.cal <= 0} style={{opacity: (!custom.name.trim() || !custom.cal || +custom.cal <= 0) ? 0.45 : 1}}>新增食物</button>
          </div>
        </>
      )}

      {tab === 'list' && (
        <>
          {todayItems.length === 0 && <div className="text-center text-slate-500 py-10">今天還沒有飲食紀錄<br/>去新增一些吧！</div>}
          {['早餐','午餐','晚餐','點心'].map(m=>{
            const items = todayItems.filter(i=>i.meal===m);
            if(!items.length) return null;
            return (
              <div key={m} className="mb-4">
                <p className="text-slate-400 text-xs font-bold mb-2">{m}</p>
                {items.map((item,idx)=>(
                  <div key={idx} className="card p-3 mb-2 flex items-center justify-between">
                    <div>
                      <p className="text-white text-sm font-medium">{item.name}</p>
                      <p className="text-slate-400 text-xs">{item.time} · P:{Math.round(item.protein)}g C:{Math.round(item.carb)}g F:{Math.round(item.fat)}g</p>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="text-orange-400 font-bold text-sm">{item.cal}kcal</span>
                      <button onClick={()=>removeItem(todayItems.indexOf(item))} className="text-slate-500 hover:text-red-400 text-lg">×</button>
                    </div>
                  </div>
                ))}
              </div>
            );
          })}
        </>
      )}

      {/* ── 七日趨勢 Tab ── */}
      {tab === 'trend' && (() => {
        const days = Array.from({length:7}, (_,i) => {
          const d = new Date(); d.setDate(d.getDate() - (6 - i));
          const str = d.toISOString().split('T')[0];
          const cal = (dietLog[str] || []).reduce((s,f) => s + f.cal, 0);
          const protein = (dietLog[str] || []).reduce((s,f) => s + f.protein, 0);
          const label = d.toLocaleDateString('zh-TW', { month:'numeric', day:'numeric' });
          const isToday = str === todayStr;
          return { str, cal, protein, label, isToday };
        });
        const maxCal = Math.max(...days.map(d => d.cal), macroGoal.cal) * 1.15;
        const W = 300, H = 120, PAD = 16;
        const xs = days.map((_,i) => PAD + i * ((W - PAD*2) / 6));
        const ys = days.map(d => PAD + (1 - d.cal / maxCal) * (H - PAD*2));
        const goalY = PAD + (1 - macroGoal.cal / maxCal) * (H - PAD*2);
        const pts = xs.map((x,i) => days[i].cal > 0 ? `${x},${ys[i]}` : null).filter(Boolean).join(' ');
        const avgProtein = Math.round(days.reduce((s,d) => s + d.protein, 0) / 7);
        const hitDays = days.filter(d => d.cal >= macroGoal.cal * 0.85 && d.cal > 0).length;
        return (
          <div className="animate-fade">
            <div className="grid grid-cols-2 gap-3 mb-4">
              <div className="card p-3 text-center">
                <p className="text-slate-400 text-xs">週平均卡路里</p>
                <p className="text-white font-bold text-xl">{Math.round(days.reduce((s,d)=>s+d.cal,0)/7)}</p>
                <p className="text-slate-500 text-xs">kcal / 天</p>
              </div>
              <div className="card p-3 text-center">
                <p className="text-slate-400 text-xs">週平均蛋白質</p>
                <p className="text-white font-bold text-xl">{avgProtein}</p>
                <p className="text-slate-500 text-xs">g / 天（目標 {macroGoal.protein}g）</p>
              </div>
            </div>
            <div className="card p-4 mb-4">
              <div className="flex items-center justify-between mb-2">
                <p className="text-slate-400 text-xs font-semibold">七日熱量走勢</p>
                <span className="text-xs" style={{color:'#34d399'}}>{hitDays}/7 天達標</span>
              </div>
              <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}}>
                {/* goal line */}
                <line x1={PAD} x2={W-PAD} y1={goalY} y2={goalY} stroke="#f97316" strokeWidth="1" strokeDasharray="4,3" opacity="0.6"/>
                <text x={W-PAD+2} y={goalY+3} fill="#f97316" fontSize="7" opacity="0.8">目標</text>
                {/* bars */}
                {days.map((d,i) => {
                  const bh = d.cal > 0 ? Math.max(4, (d.cal/maxCal)*(H-PAD*2)) : 0;
                  const hit = d.cal >= macroGoal.cal * 0.85 && d.cal > 0;
                  const color = d.cal === 0 ? '#1e293b' : hit ? '#34d399' : '#f97316';
                  return (
                    <g key={i}>
                      <rect x={xs[i]-8} y={H-PAD-bh} width={16} height={bh} rx="3" fill={color} opacity={d.isToday ? 1 : 0.7}/>
                      <text x={xs[i]} y={H-PAD+10} textAnchor="middle" fill={d.isToday?'#f97316':'#64748b'} fontSize="8">{d.label}</text>
                      {d.cal > 0 && <text x={xs[i]} y={H-PAD-bh-3} textAnchor="middle" fill={color} fontSize="7">{d.cal}</text>}
                    </g>
                  );
                })}
              </svg>
              <div className="flex items-center gap-4 mt-2">
                <div className="flex items-center gap-1"><div style={{width:8,height:8,borderRadius:2,background:'#34d399'}}/><span className="text-slate-500 text-xs">達標（≥85%）</span></div>
                <div className="flex items-center gap-1"><div style={{width:8,height:8,borderRadius:2,background:'#f97316'}}/><span className="text-slate-500 text-xs">未達標</span></div>
                <div className="flex items-center gap-1"><line x1="0" y1="4" x2="12" y2="4" stroke="#f97316" strokeDasharray="3,2" strokeWidth="1"/><span className="text-slate-500 text-xs">每日目標</span></div>
              </div>
            </div>
            <div className="card p-4">
              <p className="text-slate-400 text-xs font-semibold mb-3">每日明細</p>
              {days.slice().reverse().map(d => {
                const pct = macroGoal.cal > 0 ? Math.round((d.cal / macroGoal.cal) * 100) : 0;
                const hit = d.cal >= macroGoal.cal * 0.85 && d.cal > 0;
                return (
                  <div key={d.str} className="flex items-center gap-3 mb-2">
                    <span className="text-slate-400 text-xs" style={{width:32,flexShrink:0}}>{d.label}</span>
                    <div style={{flex:1,height:6,background:'#1e293b',borderRadius:3,overflow:'hidden'}}>
                      <div style={{width:`${Math.min(100,pct)}%`,height:'100%',background:hit?'#34d399':'#f97316',borderRadius:3,transition:'width 0.4s'}}/>
                    </div>
                    <span className="text-xs font-semibold" style={{width:52,textAlign:'right',flexShrink:0,color:d.cal===0?'#475569':hit?'#34d399':'#f97316'}}>
                      {d.cal===0 ? '無紀錄' : `${d.cal} kcal`}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ── 份量選擇 Modal ── */}
      {pendingFood && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
          <div className="card p-5" style={{width:'100%',maxWidth:'340px'}}>
            <div className="flex items-center justify-between mb-4">
              <h3 style={{color:'#f1f5f9',fontWeight:700,fontSize:'15px',flex:1,marginRight:'8px'}}>{pendingFood.name}</h3>
              <button onClick={() => setPendingFood(null)} style={{color:'#64748b',fontSize:'20px',background:'none',border:'none',cursor:'pointer',flexShrink:0}}>×</button>
            </div>
            <p className="text-slate-400 text-xs mb-3">選擇份量</p>
            <div className="grid grid-cols-4 gap-2 mb-4">
              {[0.5,1,1.5,2].map(m => (
                <button key={m} onClick={() => setServingMult(m)}
                  style={{padding:'8px 0',borderRadius:'10px',fontSize:'13px',fontWeight:700,cursor:'pointer',
                    background: servingMult===m ? '#f97316' : '#1e293b',
                    color: servingMult===m ? '#fff' : '#94a3b8',
                    border: servingMult===m ? 'none' : '1px solid #334155'}}>
                  ×{m}
                </button>
              ))}
            </div>
            <div className="flex items-center gap-2 mb-4">
              <span className="text-slate-400 text-xs">自訂倍數：</span>
              <input type="number" min="0.1" max="10" step="0.1"
                value={servingMult}
                onChange={e => setServingMult(+e.target.value || 1)}
                style={{width:'80px',padding:'6px 10px',textAlign:'center'}}/>
            </div>
            <div className="card p-3 mb-4 text-center" style={{background:'rgba(249,115,22,0.08)'}}>
              <p style={{color:'#f97316',fontWeight:700,fontSize:'20px'}}>{Math.round(pendingFood.cal * servingMult)} <span style={{fontSize:'12px',fontWeight:400}}>kcal</span></p>
              <p style={{color:'#94a3b8',fontSize:'11px',marginTop:'4px'}}>
                P:{Math.round(pendingFood.protein*servingMult*10)/10}g · C:{Math.round(pendingFood.carb*servingMult*10)/10}g · F:{Math.round(pendingFood.fat*servingMult*10)/10}g
              </p>
            </div>
            <button onClick={() => addFood(pendingFood, servingMult)} className="btn-primary w-full">
              加入 {meal}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── TDEE MODAL ───────────────────────────────────────────────────────────────

function TDEEModal({ onClose }) {
  const [form, setForm] = useState({ gender:'男', age:'25', height:'170', weight:'65', activity:'1.375' });
  const [result, setResult] = useState(null);
  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const calc = () => {
    const { gender, age, height, weight, activity } = form;
    const h = +height, w = +weight, a = +age, act = +activity;
    if (!h || !w || !a) return;
    const bmi = w / ((h / 100) ** 2);
    const bmr = gender === '男'
      ? 10 * w + 6.25 * h - 5 * a + 5
      : 10 * w + 6.25 * h - 5 * a - 161;
    const tdee = Math.round(bmr * act);
    const bmiLabel = bmi < 18.5 ? '體重過輕' : bmi < 24 ? '正常範圍' : bmi < 27 ? '過重' : '肥胖';
    const bmiColor = bmi < 18.5 ? '#60a5fa' : bmi < 24 ? '#34d399' : bmi < 27 ? '#fbbf24' : '#f43f5e';
    setResult({ bmi: bmi.toFixed(1), bmiLabel, bmiColor, bmr: Math.round(bmr), tdee,
      cut: tdee - 300, bulk: tdee + 300 });
  };

  const actOptions = [
    { v:'1.2', l:'久坐（很少運動）' },
    { v:'1.375', l:'輕度（每週1-3次）' },
    { v:'1.55', l:'中度（每週3-5次）' },
    { v:'1.725', l:'激烈（每週6-7次）' },
  ];

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-bold text-white text-xl">🧮 TDEE / BMI 計算器</h2>
          <button onClick={onClose} className="text-slate-400 text-2xl">×</button>
        </div>
        <div className="grid grid-cols-2 gap-2 mb-3">
          <div>
            <p className="text-slate-400 text-xs mb-1">性別</p>
            <div className="flex gap-2">
              {['男','女'].map(g => (
                <button key={g} onClick={() => set('gender', g)}
                  className={`chip flex-1 justify-center ${form.gender===g?'chip-active':'chip-inactive'}`}>{g}</button>
              ))}
            </div>
          </div>
          <div>
            <p className="text-slate-400 text-xs mb-1">年齡</p>
            <input type="number" min="10" max="120" value={form.age} onChange={e=>set('age',e.target.value)} placeholder="歲"/>
          </div>
          <div>
            <p className="text-slate-400 text-xs mb-1">身高 (cm)</p>
            <input type="number" min="50" max="250" value={form.height} onChange={e=>set('height',e.target.value)} placeholder="cm"/>
          </div>
          <div>
            <p className="text-slate-400 text-xs mb-1">體重 (kg)</p>
            <input type="number" min="20" max="500" value={form.weight} onChange={e=>set('weight',e.target.value)} placeholder="kg"/>
          </div>
        </div>
        <div className="mb-4">
          <p className="text-slate-400 text-xs mb-1">活動量</p>
          <select value={form.activity} onChange={e=>set('activity',e.target.value)}>
            {actOptions.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
          </select>
        </div>
        <button onClick={calc} className="btn-primary w-full mb-4">計算</button>
        {result && (
          <div className="animate-fade">
            <div className="grid grid-cols-2 gap-3 mb-3">
              <div className="card p-3 text-center">
                <p className="text-slate-400 text-xs">BMI</p>
                <p className="text-2xl font-bold" style={{color:result.bmiColor}}>{result.bmi}</p>
                <p className="text-xs font-semibold" style={{color:result.bmiColor}}>{result.bmiLabel}</p>
              </div>
              <div className="card p-3 text-center">
                <p className="text-slate-400 text-xs">基礎代謝率 BMR</p>
                <p className="text-2xl font-bold text-white">{result.bmr}</p>
                <p className="text-slate-400 text-xs">kcal/天</p>
              </div>
            </div>
            <div className="card-orange p-4 mb-3 text-center">
              <p className="text-orange-100 text-xs font-semibold">每日總消耗 TDEE</p>
              <p className="text-white text-4xl font-bold">{result.tdee}</p>
              <p className="text-orange-200 text-xs">kcal / 天</p>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div className="card p-3 text-center">
                <p className="text-slate-400 text-xs">🔥 減脂建議攝取</p>
                <p className="text-blue-400 text-xl font-bold">{result.cut}</p>
                <p className="text-slate-500 text-xs">kcal（TDEE-300）</p>
              </div>
              <div className="card p-3 text-center">
                <p className="text-slate-400 text-xs">💪 增肌建議攝取</p>
                <p className="text-green-400 text-xl font-bold">{result.bulk}</p>
                <p className="text-slate-500 text-xs">kcal（TDEE+300）</p>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PROGRESS PAGE ────────────────────────────────────────────────────────────

function ProgressPage({ records, setRecords, onAffChange }) {
  const [weight, setWeight] = useState('');
  const [note, setNote] = useState('');
  const [tab, setTab] = useState('records');
  const todayStr = new Date().toISOString().split('T')[0];

  const addWeight = () => {
    if (!weight) return;
    const w = +weight;
    if (w <= 0 || w > 500) return;
    const entry = { date: todayStr, weight: w, note: note.trim(), type: 'weight', displayDate: new Date().toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' }) };
    setRecords([...records, entry]);
    setWeight('');
    setNote('');
    if (onAffChange) onAffChange(2); // 好感度 +2
  };

  const weightRecords = React.useMemo(() => records.filter(r => r.type === 'weight').slice(-30), [records]);
  const workoutRecords = React.useMemo(() => records.filter(r => r.type === 'workout').slice().reverse().slice(0, 20), [records]);

  // Heatmap — useMemo 避免每次 render 重建 70 個日期
  const { workoutDates, heatWeeks, streak } = React.useMemo(() => {
    const wDates = new Set(records.filter(r => r.type === 'workout').map(r => r.date));
    const days = Array.from({length: 70}, (_, i) => {
      const d = new Date(); d.setDate(d.getDate() - (69 - i));
      const str = d.toISOString().split('T')[0];
      return { str, has: wDates.has(str) };
    });
    let s = 0;
    for (let i = 0; i < 70; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      if (wDates.has(d.toISOString().split('T')[0])) s++; else break;
    }
    return { workoutDates: wDates, heatWeeks: Array.from({length:10},(_,i)=>days.slice(i*7,i*7+7)), streak: s };
  }, [records]);

  const { maxWeight, minWeight, range } = React.useMemo(() => {
    const mx = Math.max(...weightRecords.map(r => r.weight), 0);
    const mn = Math.min(...weightRecords.map(r => r.weight), 999);
    return { maxWeight: mx, minWeight: mn, range: mx - mn || 1 };
  }, [weightRecords]);


  // #5 體重目標日期預測（線性迴歸）
  return (
    <div className="main-content px-4 py-6 animate-fade">
      <h1 className="text-2xl font-bold text-white mb-4">進度紀錄 📊</h1>

      <div className="flex gap-2 mb-4" style={{flexWrap:'wrap'}}>
        {[{id:'records',label:'訓練紀錄'},{id:'weight',label:'體重追蹤'},{id:'calendar',label:'🔥 熱力圖'},{id:'badges',label:'🏅 徽章'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className={`chip ${tab===t.id?'chip-active':'chip-inactive'}`}>{t.label}</button>
        ))}
      </div>

      {tab === 'weight' && (
        <>
          <div className="card p-4 mb-4">
            <p className="text-slate-400 text-xs font-semibold mb-3">記錄今日體重</p>
            <input placeholder="體重 (kg)" type="number" step="0.1" min="20" max="500" value={weight} onChange={e=>setWeight(e.target.value)} className="mb-2"/>
            <input placeholder="備註（選填）" value={note} onChange={e=>setNote(e.target.value)} className="mb-3"/>
            <button onClick={addWeight} className="btn-primary w-full" disabled={!weight || +weight <= 0} style={{opacity: (!weight || +weight <= 0) ? 0.45 : 1}}>記錄體重</button>
          </div>



          {weightRecords.length > 0 && (() => {
            const W = 320, H = 140, PAD = 20;
            const xs = weightRecords.map((_, i) => PAD + i * ((W - PAD*2) / Math.max(weightRecords.length - 1, 1)));
            const ys = weightRecords.map(r => PAD + (1 - (r.weight - minWeight) / range) * (H - PAD*2));
            const pts = xs.map((x, i) => `${x},${ys[i]}`).join(' ');
            const area = `M${xs[0]},${H-PAD} L${xs.map((x,i)=>`${x},${ys[i]}`).join(' L')} L${xs[xs.length-1]},${H-PAD} Z`;
            return (
              <div className="card p-4 mb-4">
                <p className="text-slate-400 text-xs font-semibold mb-2">📈 體重趨勢折線圖</p>
                <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}}>
                  {[0,1,2,3].map(i => (
                    <line key={i} x1={PAD} x2={W-PAD}
                      y1={PAD + i*(H-PAD*2)/3} y2={PAD + i*(H-PAD*2)/3}
                      stroke="#1e293b" strokeWidth="1"/>
                  ))}
                  <path d={area} fill="url(#wgrad)" opacity="0.35"/>
                  <defs>
                    <linearGradient id="wgrad" x1="0" x2="0" y1="0" y2="1">
                      <stop offset="0%" stopColor="#f97316" stopOpacity="0.8"/>
                      <stop offset="100%" stopColor="#f97316" stopOpacity="0"/>
                    </linearGradient>
                  </defs>
                  <polyline points={pts} fill="none" stroke="#f97316" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
                  {xs.map((x, i) => (
                    <g key={i}>
                      <circle cx={x} cy={ys[i]} r="4" fill="#f97316" stroke="#0f172a" strokeWidth="1.5"/>
                      {(i === 0 || i === weightRecords.length-1 || weightRecords.length <= 8) && (
                        <text x={x} y={ys[i]-8} textAnchor="middle" fill="#fb923c" fontSize="9">{weightRecords[i].weight}</text>
                      )}
                    </g>
                  ))}
                </svg>
                <div className="flex justify-between mt-1">
                  <span className="text-slate-500 text-xs">最低 {minWeight} kg</span>
                  <span className="text-slate-500 text-xs">最高 {maxWeight} kg</span>
                  {weightRecords.length >= 2 && (
                    <span className={`text-xs font-semibold ${weightRecords[weightRecords.length-1].weight < weightRecords[0].weight ? 'text-green-400' : 'text-red-400'}`}>
                      {weightRecords[weightRecords.length-1].weight < weightRecords[0].weight ? '▼' : '▲'} {Math.abs(weightRecords[weightRecords.length-1].weight - weightRecords[0].weight).toFixed(1)} kg
                    </span>
                  )}
                </div>
              </div>
            );
          })()}

          {weightRecords.length === 0 && <div className="text-center text-slate-500 py-10">還沒有體重紀錄<br/>開始追蹤你的進度吧！</div>}
        </>
      )}

      {tab === 'calendar' && (
        <div className="animate-fade">
          <div className="grid grid-cols-2 gap-3 mb-4">
            {[['🔥 連續天數', `${streak} 天`], ['💪 總訓練次數', `${workoutDates.size} 次`]].map(([l, v]) => (
              <div key={l} className="card p-3 text-center">
                <p className="text-slate-400 text-xs">{l}</p>
                <p className="text-white font-bold text-2xl">{v}</p>
              </div>
            ))}
          </div>
          <div className="card p-4">
            <p className="text-slate-400 text-xs font-semibold mb-3">過去 10 週訓練紀錄</p>
            <div className="flex gap-1.5">
              {heatWeeks.map((week, wi) => (
                <div key={wi} className="flex flex-col gap-1.5 flex-1">
                  {week.map((d, di) => (
                    <div key={di} style={{
                      width: '100%', aspectRatio: '1', borderRadius: '3px',
                      background: d.has ? '#f97316' : '#1e293b',
                      border: `1px solid ${d.has ? '#ea580c' : '#334155'}`,
                    }} title={d.str} />
                  ))}
                </div>
              ))}
            </div>
            <div className="flex items-center gap-2 mt-3 justify-end">
              <div style={{width:12,height:12,borderRadius:2,background:'#1e293b',border:'1px solid #334155'}}/>
              <span className="text-slate-500 text-xs">無訓練</span>
              <div style={{width:12,height:12,borderRadius:2,background:'#f97316'}}/>
              <span className="text-slate-500 text-xs">有訓練</span>
            </div>
          </div>
        </div>
      )}

      {tab === 'badges' && (() => {
        const totalWorkouts = workoutDates.size;

function calcMacros(profile) {
  if (!profile || !profile.done || !profile.weight || !profile.height || !profile.age) {
    return { cal: 1800, protein: 120, carb: 200, fat: 60 };
  }
  const w = +profile.weight, h = +profile.height, a = +profile.age;
  const bmr = profile.gender === '男'
    ? 10*w + 6.25*h - 5*a + 5
    : 10*w + 6.25*h - 5*a - 161;
  const tdee = Math.round(bmr * 1.375);
  const isCut = profile.goal !== 'bulk';
  const cal = isCut ? tdee - 400 : tdee + 250;
  const protein = Math.round(w * (isCut ? 2.0 : 2.2));
  const fat = Math.round(w * 0.9);
  const carb = Math.round((cal - protein * 4 - fat * 9) / 4);
  return { cal, protein, carb: Math.max(50, carb), fat };
}

              return <BearChat text="⚠️ 昨晚睡不到 6 小時！今天請降低訓練強度，或改做伸展恢復，睡眠不足時強練容易受傷！" />;
            if (todaySleep && todaySleep.hours >= 8)
              return <BearChat text="🔋 昨晚睡足 8 小時！今天肌肉修復完全，可以全力衝！" />;
            return null;
          })()}

        {/* 熊大大每週總結 */}

          const weekMsgs = [

            weekWorkouts.length >= 3 && weekWorkouts.length < 5 && `太棒了！這週完成 ${weekWorkouts.length} 次訓練！熊大大超級驕傲！🎉`,
            weekWorkouts.length >= 5 && `哇！這週完成 ${weekWorkouts.length} 次訓練！你是真正的健身猛人！🏆`,

        {[

function PostWorkoutSummary({ data, affection, onDone }) {
  const { workout, elapsed, weekCount } = data;
  const mins = elapsed ? Math.round(elapsed / 60) : workout.duration;
  const bearMsgs = [
    weekCount >= 5 ? '這週第 ' + weekCount + ' 練！你是真正的猛人！🏆' : null,
    weekCount === 3 ? '週三練達標！熊大大超級驕傲！🎉' : null,
    weekCount < 3 ? '繼續保持！目標本週 3 次！💪' : null,
  ].filter(Boolean)[0] || '太棒了！每次訓練都是進步！🐻';

  const emotion = affection >= 80 ? '❤️' : affection >= 60 ? '😊' : affection >= 40 ? '😠' : '🔥';
  const aff = Math.min(100, affection); // after +5 already applied

  useEffect(() => {
    const t = setTimeout(onDone, 8000);
    return () => clearTimeout(t);
  }, []);

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(15,23,42,0.96)',zIndex:300,
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px'}}>
      {/* Confetti strips */}

        <div key={i} className="confetti-piece" style={{
          background:['#f97316','#fbbf24','#34d399','#60a5fa','#f472b6','#a78bfa'][i%6],
          left:`${(i/32)*100}%`,top:'-12px',
          width:`${7+(i%3)*3}px`,height:`${7+(i%4)*2}px`,
          animationDelay:`${(i%5)*0.08}s`
        }}/>
      ))}
      <div className="animate-fade text-center" style={{zIndex:1}}>
        <div style={{fontSize:'72px',marginBottom:'8px'}}>{workout.icon}</div>
        <h2 className="text-white text-2xl font-bold mb-1">{workout.name}</h2>
        <p className="text-orange-400 text-sm font-semibold mb-6">訓練完成！</p>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'20px',width:'100%',maxWidth:'320px'}}>
          {[
            ['⏱', String(Math.floor(mins/60)).padStart(2,'0')+':'+String(mins%60).padStart(2,'0'), '訓練時間'],
            ['🔥', weekCount + ' 次', '本週累計'],

          <BearSVG size={36} affection={aff} />
          <p className="text-slate-200 text-sm mt-2">{bearMsgs}</p>
        </div>

        <button className="btn-primary" style={{width:'100%',maxWidth:'280px'}} onClick={onDone}>
          完成！繼續加油 💪
        </button>
        <p className="text-slate-500 text-xs mt-3">8 秒後自動關閉</p>
      </div>
    </div>
  );
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────

function Confetti({ onDone }) {
  const colors = ['#f97316','#fbbf24','#34d399','#60a5fa','#f472b6','#a78bfa','#fff'];
  const pieces = Array.from({length: 48}, (_, i) => ({
    id: i,
    color: colors[i % colors.length],
    left: `${(i / 48) * 100 + (Math.random() * 4 - 2)}%`,
    delay: `${(i % 6) * 0.1}s`,
    w: `${7 + (i % 3) * 3}px`,
    h: `${7 + (i % 4) * 2}px`,
  }));
  useEffect(() => { const t = setTimeout(onDone, 2400); return () => clearTimeout(t); }, []);
  return (
    <>
      {pieces.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          background: p.color, left: p.left, top: '-12px',
          width: p.w, height: p.h, animationDelay: p.delay,
        }}/>
      ))}
    </>
  );
}

  const [isOnline, setIsOnline] = React.useState(navigator.onLine);
  const [showTDEE, setShowTDEE] = React.useState(false);
  const [affection, setAffection] = useLocalStorage('gym_affection', 70);
  const [postWorkout, setPostWorkout] = React.useState(null); // { workout, elapsed, weekCount }

  const clampAff = v => Math.min(100, Math.max(0, v));

  useEffect(() => {
    document.body.classList.toggle('light', theme === 'light');
  }, [theme]);

  // #2 系統主題跟隨（首次啟動偵測）
  useEffect(() => {
    const stored = localStorage.getItem('gym_theme');
    if (!stored) {
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(dark ? 'dark' : 'light');
    }
  }, []);

  // 好感度：48h 未訓練 -3
  useEffect(() => {
    const recs = JSON.parse(localStorage.getItem('gym_records') || '[]');
    const last = recs.filter(r => r.type === 'workout').slice(-1)[0];
    if (last) {
      const hrs = (Date.now() - new Date(last.date).getTime()) / 3600000;
      if (hrs >= 48) setAffection(a => clampAff(a - 3));
    }
  }, []);

  useEffect(() => {
    const on = () => setIsOnline(true);
    const off = () => setIsOnline(false);
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);
  const [showConfetti, setShowConfetti] = React.useState(false);
  const [showOnboard, setShowOnboard] = React.useState(() => !localStorage.getItem('gym_onboarded'));

  const handleComplete = (workout, elapsed) => {
    const today = new Date().toISOString().split('T')[0];
    const newRec = {
      date: today, type: 'workout', name: workout.name, icon: workout.icon,
      duration: elapsed ? Math.round(elapsed / 60) : workout.duration,
      displayDate: new Date().toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' }),
      note: ''
    };
    setRecords(r => {
      const updated = [...r, newRec];
      const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
      const wStr = weekAgo.toISOString().split('T')[0];
      const wCount = updated.filter(x => x.type === 'workout' && x.date >= wStr).length;
      setPostWorkout({ workout, elapsed: elapsed || 0, weekCount: wCount });
      return updated;
    });
    setAffection(a => clampAff(a + 5));
  };

  return (
    <div style={{maxWidth:'600px',margin:'0 auto',minHeight:'100vh',position:'relative',background:'var(--bg)'}}>
      {!isOnline && <div className="offline-banner">📵 目前離線中，顯示快取資料</div>}
      {showOnboard && <OnboardingScreen onDone={() => {
        localStorage.setItem('gym_onboarded','1');
        setShowOnboard(false);
      }} />}
      {postWorkout && <PostWorkoutSummary data={postWorkout} affection={affection} onDone={() => setPostWorkout(null)} />}
      {showTDEE && <TDEEModal onClose={() => setShowTDEE(false)} />}

      <div style={{paddingBottom:'72px'}}>
        {page === 'coach'    && <CoachPage records={records} setRecords={setRecords} dietLog={dietLog} profile={profile} setProfile={setProfile} affection={affection} setPage={setPage} />}
        {page === 'train'    && <TrainPage onComplete={handleComplete} favorites={favorites} setFavorites={setFavorites} />}
        {page === 'equip'    && <EquipPage />}
        {page === 'diet'     && <DietPage dietLog={dietLog} setDietLog={setDietLog} onAffChange={d => setAffection(a => clampAff(a + d))} profile={profile} />}
        {page === 'progress' && <ProgressPage records={records} setRecords={setRecords} onAffChange={d => setAffection(a => clampAff(a + d))} />}
      </div>

      <BottomNav page={page} setPage={setPage} theme={theme} setTheme={setTheme} />
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(e) {
  document.getElementById('root').innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0f172a;padding:24px;text-align:center">' +
    '<div style="font-size:48px;margin-bottom:16px">😵</div>' +
    '<p style="color:#f87171;font-weight:700;font-size:16px;margin-bottom:8px">載入失敗</p>' +
    '<p style="color:#64748b;font-size:12px">' + e.message + '</p>' +
    '</div>';
}
</script>
</body>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(e => console.warn('SW register failed:', e));
    });
  }
</script>
</html>
